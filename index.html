/* ─── ScaleWrapper (Safari/macOS fix) ─── */
const ScaleWrapper = ({ scale, children }) => {
  const innerRef = useRef(null);
  const [nh, setNh] = useState(0);
  useEffect(() => {
    if (!innerRef.current) return;
    const m = () => { if (innerRef.current) setNh(innerRef.current.scrollHeight); };
    m();
    const ro = new ResizeObserver(m);
    ro.observe(innerRef.current);
    return () => ro.disconnect();
  }, []);
  return (
    <div style={{ height: nh ? nh * scale : 'auto', width: '100%' }}>
      <div ref={innerRef} className="scale-wrapper transition-transform duration-200 ease-out"
        style={{ transform:`scale(${scale})`, width:'fit-content', margin:'0 auto' }}>
        {children}
      </div>
    </div>
  );
};

/* ─── ZoomPanel ─── */
const ZoomPanel = ({ scale, zoomIn, zoomOut, resetZoom }) => {
  const [pos, setPos] = useState({ top:16, right:16, left:'auto' });
  const [drag, setDrag] = useState(false);
  const ref = useRef(null);
  const info = useRef({});
  const moved = useRef(false);

  const onDown = e => {
    e.stopPropagation(); setDrag(true); moved.current = false;
    const r = ref.current.getBoundingClientRect();
    info.current = { sx:e.clientX, sy:e.clientY, rl:r.left, rt:r.top };
    setPos({ top:r.top, left:r.left, right:'auto' });
  };
  useEffect(() => {
    const onMove = e => {
      if (!drag) return;
      const dx=e.clientX-info.current.sx, dy=e.clientY-info.current.sy;
      if (Math.abs(dx)>3||Math.abs(dy)>3) moved.current=true;
      setPos({ top:info.current.rt+dy, left:info.current.rl+dx, right:'auto' });
    };
    const onUp = () => {
      if (!drag) return; setDrag(false);
      if (ref.current) {
        const r=ref.current.getBoundingClientRect();
        const il=r.left+r.width/2<window.innerWidth/2;
        setPos({ top:r.top, ...(il?{left:16,right:'auto'}:{right:16,left:'auto'}) });
      }
    };
    if (drag) {
      window.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp);
      window.addEventListener('pointercancel',onUp);
      document.body.style.userSelect='none';
    }
    return () => {
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
      window.removeEventListener('pointercancel',onUp);
      document.body.style.userSelect='';
    };
  }, [drag]);

  const kh = fn => e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();if(!moved.current)fn();}};
  const bc = "p-2 hover:bg-emerald-100 rounded-lg text-emerald-700 cursor-pointer touch-manipulation focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400";

  return (
    <div ref={ref} onPointerDown={onDown} role="toolbar" aria-label="Панель масштабирования"
      style={{ position:'fixed', top:pos.top, left:pos.left, right:pos.right,
        transition:drag?'none':'left .3s,right .3s,top .3s', zIndex:50 }}
      className={`cursor-grab active:cursor-grabbing touch-none bg-white/95 backdrop-blur shadow-md rounded-xl border border-emerald-200 p-1 flex items-center gap-1 transition-all ${drag?'opacity-100 shadow-xl scale-105':'opacity-90 hover:opacity-100'}`}>
      <button aria-label="Уменьшить" tabIndex={0} className={bc}
        onClick={e=>{e.stopPropagation();if(!moved.current)zoomOut();}}
        onKeyDown={kh(zoomOut)}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span aria-live="polite" aria-label={`Масштаб ${Math.round(scale*100)} процентов`}
        className="min-w-[3.5rem] text-center font-bold text-emerald-800 text-sm select-none">
        {Math.round(scale*100)}%
      </span>
      <button aria-label="Увеличить" tabIndex={0} className={bc}
        onClick={e=>{e.stopPropagation();if(!moved.current)zoomIn();}}
        onKeyDown={kh(zoomIn)}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <div className="w-px bg-emerald-200 mx-1 h-6" aria-hidden="true"></div>
      <button aria-label="Сбросить 100%" tabIndex={0} className={bc}
        onClick={e=>{e.stopPropagation();if(!moved.current)resetZoom();}}
        onKeyDown={kh(resetZoom)}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  );
};

                  <Ar className="text-base font-bold text-gray-800">{r.pr}</Ar>,
                  <span className="text-[10px]">{r.ru}</span>,
                  <Ar className="text-base font-bold text-fuchsia-700">{r.suf}</Ar>,
                  <Ar className="text-sm">{r.ism}</Ar>,
                  <Ar className="text-sm">{r.fi}</Ar>,
                  <Ar className="text-sm">{r.hf}</Ar>,
                ])}
                rowCls={r => r.p===1?'bg-blue-50/30':r.p===2?'bg-amber-50/30':'bg-rose-50/30'}
              />
            </div>

{/* ══════ БЛОК 11: ПРЕДЛОЖЕНИЯ ══════ */}
            <div className="relative w-full h-8 z-0">
              <div className="absolute top-0 left-1/2 w-0.5 h-4 bg-purple-400 -ml-[1px]"></div>
              <div className="absolute top-4 left-[calc(25%-6px)] right-[calc(25%-6px)] h-0.5 bg-purple-400"></div>
              <div className="absolute top-4 left-[calc(25%-6px)] w-0.5 h-4 bg-emerald-400"></div>
              <div className="absolute top-4 right-[calc(25%-6px)] w-0.5 h-4 bg-emerald-400"></div>
            </div>
            <div className="w-full z-10 bg-fuchsia-50 border border-fuchsia-100 rounded-xl p-3 mb-1 text-xs text-fuchsia-800 text-center">
              <strong>Урок 10 — Структура текста:</strong> Текст (<Ar>نَصٌّ</Ar>) → Предложения (<Ar>جُمْلَةٌ</Ar>) → Слова (<Ar>كَلِمَةٌ</Ar>)
            </div>
            <BHead ar="أَقْسَامُ الْجُمْلَةِ" ru="ВИДЫ ПРЕДЛОЖЕНИЙ" bg="teal" lesson={11} />
            <V2down c="teal" />
            <div className="grid grid-cols-2 gap-5 w-full z-10 items-stretch">
              {/* Именное */}
              <div className="bg-teal-50 p-4 rounded-xl border border-teal-200 flex flex-col shadow-sm">
                <h3 className="font-bold font-serif text-teal-900 text-xl text-center mb-1"><Ar>الْجُمْلَةُ الِاسْمِيَّةُ</Ar></h3>
                <div className="text-xs text-center text-teal-700 mb-3">Именное предложение — начинается с Имени (<Ar>اسم</Ar>)</div>
                <IBox color="teal"><Ar>الَّتِي تَبْدَأُ بِالِاسْمِ</Ar><br/>Та, которая начинается с имени.</IBox>
                <div className="text-[10px] font-bold text-teal-700 mt-3 mb-2">Два обязательных компонента:</div>
                <div className="flex gap-3">
                  <div className="bg-white p-3 rounded-lg flex-1 text-center border border-teal-100 shadow-sm">
                    <Ar className="font-bold text-teal-800 text-lg block">الْمُبْتَدَأُ</Ar>
                    <span className="text-[10px] text-gray-500 block mt-1">Подлежащее</span>
                    <span className="text-[9px] text-gray-400">«начатое» — о чём речь</span>
                  </div>
                  <div className="bg-white p-3 rounded-lg flex-1 text-center border border-teal-100 shadow-sm">
                    <Ar className="font-bold text-teal-800 text-lg block">الْخَبَرُ</Ar>
                    <span className="text-[10px] text-gray-500 block mt-1">Сказуемое</span>
                    <span className="text-[9px] text-gray-400">«весть» — информация о мубтада</span>
                  </div>
                </div>
                <div className="mt-3 bg-red-50 rounded p-2 text-[10px] text-red-700 font-bold text-center border border-red-100">
                  Оба всегда в состоянии <Ar>الرَّفْع</Ar>!<br/>
                  <Ar>الْمُبْتَدَأُ</Ar> в основе — всегда определённое (<Ar>مَعْرِفَة</Ar>)
                </div>
                <div className="mt-2 bg-white rounded p-2 border border-teal-100 text-[10px]">
                  <div className="font-bold text-teal-700 mb-1">Примеры:</div>
                  <div><Ar className="text-base">الْمُعَلِّمَانِ</Ar><span className="text-[9px] text-gray-400"> (مبتدأ)</span> <Ar className="text-base">مَاهِرَانِ</Ar><span className="text-[9px] text-gray-400"> (خبر)</span></div>
                  <span className="text-gray-500">Два учителя умелы</span>
                </div>
              </div>
              {/* Глагольное */}
              <div className="bg-cyan-50 p-4 rounded-xl border border-cyan-200 flex flex-col shadow-sm">
                <h3 className="font-bold font-serif text-cyan-900 text-xl text-center mb-1"><Ar>الْجُمْلَةُ الْفِعْلِيَّةُ</Ar></h3>
                <div className="text-xs text-center text-cyan-700 mb-3">Глагольное предложение — начинается с Глагола (<Ar>فعل</Ar>)</div>
                <IBox color="cyan"><Ar>الَّتِي تَبْدَأُ بِالْفِعْلِ</Ar><br/>Та, которая начинается с глагола.</IBox>
                <div className="mt-3 space-y-2">
                  {[
                    {ar:'ذَهَبَ مُحَمَّدٌ', ru:'Ушёл Мухаммад', note:'Глагол + Имя'},
                    {ar:'يَقْرَأُ الطَّالِبُ', ru:'Студент читает', note:''},
                    {ar:'جَاءَ هَؤُلَاءِ', ru:'Пришли эти', note:''},
                  ].map((e,i) => (
                    <div key={i} className="bg-white p-3 rounded-lg border border-cyan-100 text-center">
                      <Ar className="text-xl font-bold text-cyan-800 block">{e.ar}</Ar>
                      <span className="text-[10px] text-gray-500">{e.ru}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

{/* ══════ БЛОК 12-13: ГЛАГОЛЫ ══════ */}
            <V2up tc="teal" bc="emerald" />
            <ChainLink />
            <BHead ar="الْأَفْعَالُ — الصَّرْفُ" ru="СПРЯЖЕНИЕ ГЛАГОЛОВ" bg="orange" lesson="12–13" />

            {/* Словарная форма */}
            <div className="w-full z-10 bg-orange-50 border border-orange-200 rounded-xl p-3 mt-2">
              <div className="text-[10px] font-bold text-orange-700 mb-2 text-center">Словарная форма глагола (Урок 12)</div>
              <Tbl
                headers={['Русское','الماضي (он)','المضارع (он)','الأمر (ты)']}
                rows={[
                  ['читать', <Ar>قَرَأَ</Ar>, <Ar>يَقْرَأُ</Ar>, <Ar>اِقْرَأْ</Ar>],
                  ['умываться', <Ar>تَوَضَّأَ</Ar>, <Ar>يَتَوَضَّأُ</Ar>, <Ar>تَوَضَّأْ</Ar>],
                  ['молиться', <Ar>صَلَّى</Ar>, <Ar>يُصَلِّي</Ar>, <Ar>صَلِّ</Ar>],
                  ['идти', <Ar>ذَهَبَ</Ar>, <Ar>يَذْهَبُ</Ar>, <Ar>اِذْهَبْ</Ar>],
                  ['жить', <Ar>سَكَنَ</Ar>, <Ar>يَسْكُنُ</Ar>, <Ar>اُسْكُنْ</Ar>],
                ]}
              />
            </div>

            <div className="w-0.5 h-4 bg-emerald-400 z-0"></div>

            {/* Прошедшее время */}
            <div className="w-full z-10">
              <div className="text-xs font-bold text-orange-700 text-center mb-2">
                فِعْلُ الْمَاضِي — Прошедшее время (Урок 12)
                <span className="text-[10px] text-gray-500 font-normal ml-2">Основа: ذَهَبَ → + окончание (на пред. букву ставится ـْ)</span>
              </div>
              <Tbl
                headers={['Местоим.','Рус.','Глагол','Правило','Ещё примеры']}
                rows={PAST.map(r => [
                  <Ar className="text-base font-bold text-gray-800">{r.pr}</Ar>,
                  <span className="text-[10px]">{r.ru}</span>,
                  <Ar className="text-lg font-bold text-orange-800">{r.verb}</Ar>,
                  <span className="text-[10px] font-mono bg-gray-100 rounded px-1">{r.rule}</span>,
                  <Ar className="text-[10px] text-gray-500">{r.more}</Ar>,
                ])}
                rowCls={r => pColor(r.p)}
              />
              <div className="flex gap-3 mt-1 text-[9px]">
                <span className="bg-blue-50 rounded px-2 py-0.5 text-blue-600 font-bold">■ 1 лицо</span>
                <span className="bg-amber-50 rounded px-2 py-0.5 text-amber-600 font-bold">■ 2 лицо</span>
                <span className="bg-rose-50 rounded px-2 py-0.5 text-rose-600 font-bold">■ 3 лицо</span>
              </div>
            </div>

            <div className="w-0.5 h-6 bg-emerald-400 z-0"></div>

            {/* Настоящее время */}
            <div className="w-full z-10">
              <div className="text-xs font-bold text-blue-700 text-center mb-2">
                فِعْلُ الْمُضَارِعِ — Настоящее/Будущее время (Урок 13)
                <span className="text-[10px] text-gray-500 font-normal ml-2">Основа: ـذْهَبـ → приставка + основа + суффикс</span>
              </div>
              <Tbl
                headers={['Местоим.','Рус.','Глагол','Формула','Ещё примеры']}
                rows={PRESENT.map(r => [
                  <Ar className="text-base font-bold text-gray-800">{r.pr}</Ar>,
                  <span className="text-[10px]">{r.ru}</span>,
                  <Ar className="text-lg font-bold text-blue-800">{r.verb}</Ar>,
                  <span className="text-[10px] font-mono bg-gray-100 rounded px-1">{r.rule}</span>,
                  <Ar className="text-[10px] text-gray-500">{r.more}</Ar>,
                ])}
                rowCls={r => pColor(r.p)}
              />
            </div>

            <div className="w-0.5 h-6 bg-emerald-400 z-0"></div>

            {/* Повелительное */}
            <div className="w-full z-10">
              <div className="text-xs font-bold text-red-700 text-center mb-2">
                فِعْلُ الْأَمْرِ — Повелительное наклонение (Урок 13)
                <span className="text-[10px] text-gray-500 font-normal ml-2">Только для 2-го лица (الْمُخَاطَب)</span>
              </div>
              <Tbl
                headers={['Местоим.','Рус.','Приказ','Правило']}
                rows={IMPERATIVE.map(r => [
                  <Ar className="text-base font-bold text-gray-800">{r.pr}</Ar>,
                  <span className="text-[10px]">{r.ru}</span>,
                  <Ar className="text-lg font-bold text-red-800">{r.verb}</Ar>,
                  <span className="text-[10px] font-mono bg-gray-100 rounded px-1">{r.note}</span>,
                ])}
                rowCls={_ => 'bg-amber-50/30'}
              />
            </div>

          </div>
        </ScaleWrapper>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
