  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Spectral:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{body:['Spectral','Georgia','serif'],ar:['Amiri','serif']}}}}</script>
  <style>
    /* FIX 1: Proper height cascade + overflow containment prevents mobile body scroll */
    html, body, #root {
      height: 100%;
      overflow: hidden;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Spectral', Georgia, serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      margin: 0;
      padding: 0;
      touch-action: manipulation;
      background: #d6d3cd;
    }
    [lang="ar"], .font-ar { font-family: 'Amiri', serif; line-height: 2.0; }
    .term-badge { vertical-align: middle; cursor: help; }

    /* FIX 2: 100dvh accounts for mobile browser chrome (address bar).
       Falls back to 100vh for older browsers. */
    .app-root {
      height: 100vh;
      height: 100dvh;
    }

    /* OPT: will-change hint improves scroll compositing */
    .l-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(52,211,153,.45) transparent;
      will-change: scroll-position;
    }
    .l-scroll::-webkit-scrollbar { width: 5px; }
    .l-scroll::-webkit-scrollbar-thumb { background: rgba(52,211,153,.45); border-radius: 99px; }

    .r-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(100,116,139,.25) transparent;
      will-change: scroll-position;
    }
    .r-scroll::-webkit-scrollbar { width: 5px; }
    .r-scroll::-webkit-scrollbar-thumb { background: rgba(100,116,139,.25); border-radius: 99px; }

    @keyframes panelIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .panel-enter { animation: panelIn .22s ease-out forwards; }
    .lesson-hr { border: none; height: 2px; background: linear-gradient(to right, transparent, #6ee7b7 30%, #6ee7b7 70%, transparent); margin: 2.5rem 0; }
    .nav-active { background: #059669; color: #fff; box-shadow: 0 1px 6px rgba(5,150,105,.35); }
    .nav-pill { transition: background .15s, color .15s; }
    .r-header { position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,.96); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    @media (prefers-reduced-motion: reduce) { .panel-enter { animation: none; } .nav-pill { transition: none; } }
  </style>
</head>

  const t = TERMS[id]; if (!t) return null;
  return (
    <span
      className={`term-badge inline-flex items-center gap-1 rounded-md border font-bold align-middle ${big ? 'px-3 py-1.5 text-xs' : 'px-2 py-1 text-[10px]'} ${BG[t.c]} ${BD[t.c]} ${TX[t.c]}`}
      title={t.ru}
    >
      <Ar className="leading-tight">{t.ar}</Ar>
    </span>
  );
};

// FIX: min-w wrapper ensures the table scrolls horizontally on narrow panels
// rather than compressing columns to illegibility
const Tbl = ({ headers, rows, rCls }) => (
  <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm -mx-1">
    <div className="min-w-[640px]">
      <table className="w-full text-center text-sm" role="table">
        <thead className="bg-gray-100 text-gray-700 font-bold text-[10px] uppercase">

        </thead>
        <tbody className="bg-white">
          {rows.map((r, i) =>
            <tr key={i} className={`border-b border-gray-50 ${rCls ? rCls(r) : ''}`}>
              {r.cells.map((cell, j) =>
                <td key={j} className="p-2 border-r last:border-r-0 border-gray-100">{cell}</td>

          )}

    </div>
  </div>

const PH = ({ n, ar, sub }) => (
  <div className="r-header border-b border-gray-200 px-4 py-3 mb-1 md:px-5">
    <div className="flex items-center gap-2 flex-wrap">
      <span className="bg-emerald-600 text-white text-[11px] font-bold px-3 py-0.5 rounded-full shrink-0">УРОК {n}</span>
      <Ar className="text-lg font-bold text-gray-800">{ar}</Ar>
    </div>
    {sub && <p className="text-[11px] text-gray-400 mt-0.5">{sub}</p>}
  </div>
);

  <div>
    <LH n="11" ar="أَقْسَامُ الْجُمْلَةِ" sub="Виды предложений" />
    <P>Каждый язык состоит из текстов → предложений → слов. Вспомним: слово делится на <T id="ism" />, <T id="fiil" />, <T id="harf" />.</P>
    <P>Предложение (<Ar className="font-bold">الْجُمْلَةُ</Ar>) в арабском языке делится на два вида:</P>
    <H3>١. Именное предложение <Ar className="font-bold text-teal-800">الْجُمْلَةُ الِاسْمِيَّةُ</Ar></H3>
    <DefBox ar="الْجُمْلَةُ الِاسْمِيَّةُ هِيَ الَّتِي تَبْدَأُ بِالِاسْمِ" ru="Именное предложение — то, которое начинается с имени." />
    <P>Обязательно содержит два компонента:</P>
    <div className="my-3 space-y-2">
      <NumItem n="١"><T id="mubtada" /> (Подлежащее) — «начатое», то, о чём идёт речь. Почти всегда стоит в начале.</NumItem>
      <NumItem n="٢"><T id="khabar" /> (Сказуемое) — «весть», информация о мубтада. Без хабара смысл незакончен.</NumItem>
    </div>
    <RuleBox>
      Важные правила:<br/>
      • И <T id="mubtada" />, и <T id="khabar" /> всегда в состоянии <T id="rafaa" />.<br/>
      • <T id="mubtada" /> всегда должен быть <T id="marifa" /> (определённым).
    </RuleBox>
    <DefBox ar="الْمُعَلِّمَانِ مَاهِرَانِ" ru="Два учителя умелы. (الْمُعَلِّمَانِ — мубтада; مَاهِرَانِ — хабар; оба в рафа')" />
    <H3>٢. Глагольное предложение <Ar className="font-bold text-cyan-800">الْجُمْلَةُ الْفِعْلِيَّةُ</Ar></H3>
    <DefBox ar="الْجُمْلَةُ الْفِعْلِيَّةُ هِيَ الَّتِي تَبْدَأُ بِالْفِعْلِ" ru="Глагольное предложение — то, которое начинается с глагола." />
    <Exa items={[['ذَهَبَ مُحَمَّدٌ','Ушёл Мухаммад'],['يَقْرَأُ الطَّالِبُ','Студент читает'],['جَاءَ هَؤُلَاءِ','Пришли эти']]} />
  </div>
));

const LText12 = memo(() => (
  <div>
    <LH n="12" ar="فِعْلُ الْمَاضِي" sub="Прошедшее время — спряжение" />
    <P>В словарях арабские глаголы даются в трёх формах: «он сделал» / «он делает» / «сделай!». Форма <Ar className="font-bold">هُوَ</Ar> прошедшего времени — это <strong>словарная основа</strong>.</P>
    <Exa items={[['قَرَأَ — يَقْرَأُ — اِقْرَأْ','читать'],['ذَهَبَ — يَذْهَبُ — اِذْهَبْ','идти'],['سَكَنَ — يَسْكُنُ — اُسْكُنْ','жить']]} />
    <RuleBox>При добавлении большинства местоимений на последнюю букву основы ставится сукун <Ar>ـْ</Ar>.</RuleBox>
    <H3><T id="mutakallim" big /> — 1 лицо</H3>
    <Exa items={[['ذَهَبْتُ','Я ушёл/ушла (+تُ)'],['ذَهَبْنَا','Мы ушли (+نَا)']]} />
    <H3><T id="mukhatab" big /> — 2 лицо</H3>
    <Exa items={[['ذَهَبْتَ','Ты ушёл (+تَ)'],['ذَهَبْتِ','Ты ушла (+تِ)'],['ذَهَبْتُمَا','Вы двое ушли (+تُمَا)'],['ذَهَبْتُمْ','Вы ушли (+تُمْ)'],['ذَهَبْتُنَّ','Вы ушли ж.р. (+تُنَّ)']]} />
    <H3><T id="ghaib" big /> — 3 лицо</H3>
    <Exa items={[['ذَهَبَ','Он ушёл (основа)'],['ذَهَبَتْ','Она ушла (+تْ)'],['ذَهَبَا','Они двое ушли (+ا)'],['ذَهَبُوا','Они ушли м.р. (+وا, предыд. → ضمّة)'],['ذَهَبْنَ','Они ушли ж.р. (+نَ)']]} />
  </div>
));

const LText13 = memo(() => (
  <div>
    <LH n="13" ar="فِعْلُ الْمُضَارِعِ وَالْأَمْرِ" sub="Настоящее/будущее и повелительное" />
    <H3><T id="mudari" big /> — настоящее/будущее</H3>
    <H4><T id="mutakallim" big /> — 1 лицо</H4>
    <Exa items={[['أَذْهَبُ','Я иду (أَ+)'],['نَذْهَبُ','Мы идём (نَ+)'],['أَقْرَأُ / آكُلُ / أَنَامُ','Я читаю / ем / сплю']]} />
    <H4><T id="mukhatab" big /> — 2 лицо</H4>
    <Exa items={[['تَذْهَبُ','Ты идёшь м.р. (تَ+)'],['تَذْهَبِينَ','Ты идёшь ж.р. (تَ+ينَ)'],['تَذْهَبَانِ','Вы двое идёте (تَ+انِ)'],['تَذْهَبُونَ','Вы идёте м.р. (تَ+ونَ)'],['تَذْهَبْنَ','Вы идёте ж.р. (تَ+نَ)']]} />
    <H4><T id="ghaib" big /> — 3 лицо</H4>
    <Exa items={[['يَذْهَبُ','Он идёт (يَ+)'],['تَذْهَبُ','Она идёт (تَ+)'],['يَذْهَبَانِ','Они двое (يَ+انِ)'],['يَذْهَبُونَ','Они м.р. (يَ+ونَ)'],['يَذْهَبْنَ','Они ж.р. (يَ+نَ)']]} />
    <H3><T id="amr" big /> — повелительное наклонение</H3>
    <P>Используется только для 2-го лица (<T id="mukhatab" />):</P>
    <Exa items={[['اِذْهَبْ','Иди! (أنتَ — основа)'],['اِذْهَبِي','Иди! (أنتِ — +ي)'],['اِذْهَبَا','Идите! (أنتُمَا — +ا)'],['اِذْهَبُوا','Идите! (أنتُمْ — +وا, ا нечитаемый)']]} />
    <NoteBox>Повелительное наклонение всегда <T id="mabni" />. Его используют только для 2-го лица — обращаясь к тому, кто перед вами.</NoteBox>
  </div>
));

/* ══════════════════════ LESSONS REGISTRY ══════════════════════ */
const LESSONS = [
  {id:1,  titleAr:'الْكَلِمَةُ',                  Text:LText1,  Info:Info1},
  {id:2,  titleAr:'الْمُعْرَبُ وَالْمَبْنِيُّ',   Text:LText2,  Info:Info2},
  {id:3,  titleAr:'الْإِعْرَابُ التَّطْبِيقُ',    Text:LText3,  Info:Info3},
  {id:4,  titleAr:'الْمُذَكَّرُ وَالْمُؤَنَّثُ',  Text:LText4,  Info:Info4},
  {id:5,  titleAr:'الْمُثَنَّى',                  Text:LText5,  Info:Info5},
  {id:6,  titleAr:'جَمْعُ الْمُذَكَّرِ السَّالِمِ',Text:LText6, Info:Info6},
  {id:7,  titleAr:'جَمْعُ الْمُؤَنَّثِ وَالتَّكْسِيرِ',Text:LText7,Info:Info7},
  {id:8,  titleAr:'النَّكِرَةُ وَالْمَعْرِفَةُ',  Text:LText8,  Info:Info8},
  {id:9,  titleAr:'الضَّمَائِرُ الْمُنْفَصِلَةُ', Text:LText9,  Info:Info9},
  {id:10, titleAr:'الضَّمَائِرُ الْمُتَّصِلَةُ',  Text:LText10, Info:Info10},
  {id:11, titleAr:'أَقْسَامُ الْجُمْلَةِ',        Text:LText11, Info:Info11},
  {id:12, titleAr:'فِعْلُ الْمَاضِي',             Text:LText12, Info:Info12},
  {id:13, titleAr:'فِعْلُ الْمُضَارِعِ وَالْأَمْرِ',Text:LText13,Info:Info13},
];

/* ══════════════════════ APP ══════════════════════ */
const App = () => {
  const [active, setActive] = useState(1);
  const leftRef  = useRef(null);
  const secRefs  = useRef({});
  const ticking  = useRef(false);

  // Scroll-spy: update active lesson as user scrolls left column
  useEffect(() => {
    const el = leftRef.current;
    if (!el) return;
    const onScroll = () => {
      if (ticking.current) return;
      ticking.current = true;
      requestAnimationFrame(() => {
        const containerTop = el.getBoundingClientRect().top;
        const trigger = containerTop + el.clientHeight * 0.25;
        let cur = 1;
        for (const [id, sec] of Object.entries(secRefs.current)) {
          if (sec && sec.getBoundingClientRect().top <= trigger) cur = parseInt(id);
        }
        // Functional update avoids stale closure and skips re-render when unchanged
        setActive(prev => prev !== cur ? cur : prev);
        ticking.current = false;
      });
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  // OPT: navigate to lesson by scrolling left panel to section
  const goTo = useCallback((id) => {
    const sec = secRefs.current[id];
    const container = leftRef.current;
    if (sec && container) {
      const delta = sec.getBoundingClientRect().top - container.getBoundingClientRect().top - TOPBAR_H;
      container.scrollBy({ top: delta, behavior: 'smooth' });
    }
  }, []);

  // OPT: useMemo avoids re-computing the active panel component reference on
  // renders caused by reasons other than `active` changing (none currently, but
  // defensive for future additions)
  const ActiveInfo = useMemo(() => LESSONS[active - 1].Info, [active]);

  return (
    // FIX: .app-root uses height:100dvh (defined in CSS) with 100vh fallback
    // for correct full-screen behavior on mobile when the browser address bar
    // appears / disappears
    <div className="app-root flex flex-col overflow-hidden bg-[#d6d3cd]">

      {/* ── Top bar ── */}
      <div className="h-10 flex-shrink-0 bg-emerald-800 flex items-center px-4 gap-4 shadow-md z-30">
        <Ar className="text-white font-bold text-base">عبد الأحد</Ar>
        <div className="w-px h-5 bg-emerald-600" aria-hidden="true"></div>
        <span className="text-emerald-200 text-[12px] font-medium">Арабская Грамматика — Уроки 1–13</span>
        <div className="ml-auto flex items-center gap-4">
          <span className="text-emerald-300 text-[11px]" aria-live="polite" aria-atomic="true">
            Урок {active} из 13
          </span>
          <div className="w-28 h-1.5 bg-emerald-700 rounded-full overflow-hidden" role="progressbar" aria-valuenow={active} aria-valuemin={1} aria-valuemax={13}>
            <div className="h-full bg-emerald-300 rounded-full transition-all duration-300" style={{ width: `${(active / 13) * 100}%` }}></div>
          </div>
        </div>
      </div>

      {/* ── Two-column layout (stacked on mobile, side-by-side on md+) ── */}
      <div className="flex flex-1 overflow-hidden flex-col md:flex-row">

        {/* LEFT – Lesson text */}
        <div className="flex-1 flex flex-col overflow-hidden border-b md:border-b-0 md:border-r border-stone-300 bg-[#fdf8f0]">

          {/* Lesson navigation pills */}
          <nav
            role="navigation"
            aria-label="Навигация по урокам"
            className="flex-shrink-0 flex overflow-x-auto gap-1.5 px-3 py-2 border-b border-stone-300/60 bg-stone-100/80 z-20 snap-x snap-mandatory"
          >
            {LESSONS.map(l => (
              <button
                key={l.id}
                onClick={() => goTo(l.id)}
                aria-label={`Урок ${l.id}`}
                aria-current={active === l.id ? 'true' : undefined}
                className={`nav-pill flex-shrink-0 min-w-[2rem] text-[11px] font-bold px-2.5 py-1 rounded-full border snap-start ${
                  active === l.id
                    ? 'nav-active border-emerald-600'
                    : 'bg-white text-stone-500 border-stone-200 hover:border-emerald-300 hover:text-emerald-700'
                }`}
              >
                {l.id}
              </button>
            ))}
          </nav>

          {/* Scrollable text body */}
          <div ref={leftRef} className="l-scroll flex-1 overflow-y-auto px-4 py-5 md:px-6">
            {LESSONS.map((l, i) => (
              <div key={l.id}>
                <section
                  ref={el => secRefs.current[l.id] = el}
                  data-lesson={l.id}
                  aria-label={`Урок ${l.id}`}
                >
                  <l.Text />
                </section>
                {i < LESSONS.length - 1 && <hr className="lesson-hr" aria-hidden="true" />}
              </div>
            ))}
            <div className="h-12" aria-hidden="true"></div>
          </div>
        </div>

        {/* RIGHT – Infographic panel (key remounts to reset scroll + replay animation) */}
        <div className="flex-1 flex flex-col overflow-hidden bg-white">
          <div key={active} className="r-scroll panel-enter flex-1 overflow-y-auto">
            <ActiveInfo />
          </div>
        </div>

      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
