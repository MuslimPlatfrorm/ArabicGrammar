<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Арабская Грамматика</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Spectral:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{body:['Spectral','Georgia','serif'],ar:['Amiri','serif']}}}}</script>
  <style>
    html,body,#root{height:100%;overflow:hidden;}
    #app-shell{
      transform-origin:top left;
      transform:scale(var(--app-scale,1));
      width:calc(100% / var(--app-scale,1));
      height:calc(100dvh / var(--app-scale,1));
      overflow:hidden;
    }
    *,*::before,*::after{box-sizing:border-box;}
    body{font-family:'Spectral',Georgia,serif;-webkit-text-size-adjust:100%;overscroll-behavior:none;margin:0;padding:0;touch-action:manipulation;}
    [lang="ar"],.font-ar{font-family:'Amiri',serif;line-height:2.1;}

    .l-scroll{scrollbar-width:thin;scrollbar-color:rgba(52,211,153,.45) transparent;}
    .l-scroll::-webkit-scrollbar{width:4px;}
    .l-scroll::-webkit-scrollbar-thumb{background:rgba(52,211,153,.45);border-radius:99px;}
    .r-scroll{scrollbar-width:thin;scrollbar-color:rgba(100,116,139,.25) transparent;}
    .r-scroll::-webkit-scrollbar{width:4px;}
    .r-scroll::-webkit-scrollbar-thumb{background:rgba(100,116,139,.25);border-radius:99px;}
    .nav-strip{scrollbar-width:none;}
    .nav-strip::-webkit-scrollbar{display:none;}

    @keyframes panelIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .panel-enter{animation:panelIn .2s ease-out forwards;will-change:opacity,transform;}

    .lesson-hr{border:none;height:2px;background:linear-gradient(to right,transparent,#6ee7b7 30%,#6ee7b7 70%,transparent);margin:2rem 0;}
    .nav-active{background:#059669;color:#fff;box-shadow:0 1px 6px rgba(5,150,105,.35);}
    .nav-pill{transition:background .15s,color .15s;}
    .r-header{position:relative;z-index:10;}

    /* ── ANTAGONIST MASKING ARCHITECTURE ──────────────────────────────────── */
    .antagonist-layer{
      position:absolute;top:0;left:0;bottom:0;right:0;
      width:100%;height:100%;
      display:flex;flex-direction:column;
      touch-action:pan-y;
    }
    .layer-left{z-index:1;background:#fdf8f0;}
    .layer-right{
      z-index:2;background:#ffffff;
      clip-path:inset(0 0 0 var(--div-x,50%));
      will-change:clip-path;
    }

    .container-snapping .layer-right{
      transition:clip-path .3s cubic-bezier(.4,0,.2,1);
    }
    .container-snapping .col-divider{
      transition:transform .3s cubic-bezier(.4,0,.2,1);
    }

    .col-divider{
      position:absolute;top:0;bottom:0;left:0;
      width:36px;
      transform:translateX(calc(var(--div-x,50%) - 50%));
      will-change:transform;
      z-index:20;
      cursor:col-resize;
      display:flex;align-items:center;justify-content:center;
      user-select:none;touch-action:none;
    }
    .col-divider-line{
      position:absolute;
      width:4px;height:100%;
      background:linear-gradient(to bottom,#6ee7b7,#10b981 50%,#6ee7b7);
      transition:width .15s,background .15s;
      pointer-events:none;
    }
    .col-divider.resizing .col-divider-line{
      width:6px;
      background:linear-gradient(to bottom,#34d399,#059669 50%,#34d399);
    }
    .col-divider-handle{
      position:absolute;
      top:50%;left:50%;
      transform:translate(calc(-50% + (0.5 - var(--div-ratio,0.5)) * 36px),-50%);
      width:36px;height:36px;
      background:#ffffff;
      border:3px solid #10b981;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(0,0,0,.25);
      transition:border-color .15s,background-color .15s;
      z-index:2;
    }
    .col-divider.resizing .col-divider-handle{
      border-color:#059669;
      background:#f0fdf4;
    }
    .col-divider-handle::before,
    .col-divider-handle::after{
      content:'';display:block;
      width:2px;height:14px;
      background:#10b981;
      margin:0 2px;border-radius:2px;
    }
    .col-divider.resizing .col-divider-handle::before,
    .col-divider.resizing .col-divider-handle::after{
      background:#059669;
    }
    
    @media (hover: hover) and (pointer: fine) {
      .col-divider:hover .col-divider-line {
        width:6px;
        background:linear-gradient(to bottom,#34d399,#059669 50%,#34d399);
      }
      .col-divider:hover .col-divider-handle {
        border-color:#059669;
        background:#f0fdf4;
      }
      .col-divider:hover .col-divider-handle::before,
      .col-divider:hover .col-divider-handle::after {
        background:#059669;
      }
    }

    .r-scroll{overflow-x:hidden;overflow-y:auto;}
    .r-scroll > *{min-width:0;}
    .r-scroll p,.r-scroll div,.r-scroll li,.r-scroll td{overflow-wrap:break-word;}
    .r-scroll [lang="ar"]{word-break:normal;overflow-wrap:normal;}

    .zoom-panel-base{
      position:fixed;z-index:9999;
      background:rgba(255,255,255,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      border:1px solid #a7f3d0;border-radius:14px;
      padding:3px 5px;display:flex;align-items:center;gap:1px;
      box-shadow:0 4px 18px rgba(5,150,105,.18);
      touch-action:none;cursor:grab;opacity:.88;
      transition:opacity .15s,box-shadow .15s,left .3s,right .3s,top .3s;
    }
    .zoom-panel-base:hover{opacity:1;box-shadow:0 6px 24px rgba(5,150,105,.28);}
    .zoom-panel-base.dragging{cursor:grabbing;opacity:1;box-shadow:0 8px 28px rgba(5,150,105,.38);transition:none;}
    .zp-btn{
      width:32px;height:32px;border-radius:9px;border:none;background:none;
      display:flex;align-items:center;justify-content:center;
      color:#065f46;cursor:pointer;touch-action:manipulation;
      transition:background .12s;flex-shrink:0;
    }
    .zp-btn:hover{background:#d1fae5;}
    .zp-btn:active{background:#a7f3d0;}
    .zp-sep{width:1px;height:16px;background:#a7f3d0;margin:0 2px;flex-shrink:0;}
    .zp-pct{font-size:11px;font-weight:700;color:#065f46;min-width:38px;text-align:center;user-select:none;cursor:grab;}

    .ag2{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem;}
    .ag3{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.45rem;}
    .ag4{display:grid;grid-template-columns:repeat(auto-fit,minmax(65px,1fr));gap:.4rem;}

    @media(prefers-reduced-motion:reduce){
      .panel-enter{animation:none;}
      .nav-pill,.col-divider-line,.split-track{transition:none;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,memo}=React;

/* ══════════ TERMS ══════════ */
const TERMS={
  nahw:{ar:'النَّحْوُ',ru:'Нахьву',c:'emerald'},
  sarf:{ar:'الصَّرْفُ',ru:'Сарф',c:'teal'},
  kalima:{ar:'الْكَلِمَةُ',ru:'Калима',c:'emerald'},
  ism:{ar:'الِاسْمُ',ru:'Исм',c:'sky'},
  fiil:{ar:'الْفِعْلُ',ru:'Фи\'л',c:'amber'},
  madi:{ar:'الْمَاضِي',ru:'Мады',c:'orange'},
  mudari:{ar:'الْمُضَارِعُ',ru:'Мудори',c:'blue'},
  amr:{ar:'الْأَمْرُ',ru:'Амр',c:'red'},
  harf:{ar:'الْحَرْفُ',ru:'Харф',c:'slate'},
  mabni:{ar:'الْمَبْنِيُّ',ru:'Мабни',c:'rose'},
  murab:{ar:'الْمُعْرَبُ',ru:'Му\'роб',c:'green'},
  hal:{ar:'حَالَةٌ',ru:'Халя',c:'emerald'},
  rafaa:{ar:'الرَّفْعُ',ru:'Рафа\'',c:'green'},
  nasb:{ar:'النَّصْبُ',ru:'Насб',c:'amber'},
  jarr:{ar:'الْجَرُّ',ru:'Джарр',c:'orange'},
  jazm:{ar:'الْجَزْمُ',ru:'Джазм',c:'red'},
  muzakkar:{ar:'الْمُذَكَّرُ',ru:'Музаккар',c:'blue'},
  muannas:{ar:'الْمُؤَنَّثُ',ru:'Муаннас',c:'pink'},
  mufrad:{ar:'الْمُفْرَدُ',ru:'Муфрад',c:'indigo'},
  musanna:{ar:'الْمُثَنَّى',ru:'Мусанни',c:'indigo'},
  jamaa:{ar:'الْجَمْعُ',ru:'Джам\'а',c:'indigo'},
  mubtada:{ar:'الْمُبْتَدَأُ',ru:'Мубтада',c:'teal'},
  khabar:{ar:'الْخَبَرُ',ru:'Хабар',c:'cyan'},
  jam_muzakkar:{ar:'جَمْعُ الْمُذَكَّرِ السَّالِمِ',ru:'Дж.Муз.Сани',c:'blue'},
  jam_muannas:{ar:'جَمْعُ الْمُؤَنَّثِ السَّالِمِ',ru:'Дж.Муан.Сани',c:'pink'},
  jam_taksir:{ar:'جَمْعُ التَّكْسِيرِ',ru:'Дж.Таксиир',c:'orange'},
  nakira:{ar:'النَّكِرَةُ',ru:'Накира',c:'gray'},
  marifa:{ar:'الْمَعْرِفَةُ',ru:'Ма\'рифа',c:'yellow'},
  damir:{ar:'الضَّمَائِرُ',ru:'Домаир',c:'purple'},
  munfasil:{ar:'الْمُنْفَصِلَةُ',ru:'Мунфасил',c:'purple'},
  muttasil:{ar:'الْمُتَّصِلَةُ',ru:'Муттасил',c:'fuchsia'},
  mutakallim:{ar:'الْمُتَكَلِّمُ',ru:'Мутакаллим',c:'blue'},
  mukhatab:{ar:'الْمُخَاطَبُ',ru:'Мухатаб',c:'amber'},
  ghaib:{ar:'الْغَائِبُ',ru:'Гойб',c:'rose'},
};

/* ══════════ BASE COMPONENTS ══════════ */
const Ar=({children,className=''})=><span dir="rtl" lang="ar" className={`font-ar leading-[2.1] ${className}`}>{children}</span>;

const T_BG={emerald:'bg-emerald-100',teal:'bg-teal-100',sky:'bg-sky-100',blue:'bg-blue-100',amber:'bg-amber-100',orange:'bg-orange-100',red:'bg-red-100',slate:'bg-slate-100',green:'bg-green-100',rose:'bg-rose-100',pink:'bg-pink-100',purple:'bg-purple-100',fuchsia:'bg-fuchsia-100',indigo:'bg-indigo-100',violet:'bg-violet-100',cyan:'bg-cyan-100',gray:'bg-gray-100',yellow:'bg-yellow-100'};
const T_BD={emerald:'border-emerald-300',teal:'border-teal-300',sky:'border-sky-300',blue:'border-blue-300',amber:'border-amber-300',orange:'border-orange-300',red:'border-red-300',slate:'border-slate-300',green:'border-green-300',rose:'border-rose-300',pink:'border-pink-300',purple:'border-purple-300',fuchsia:'border-fuchsia-300',indigo:'border-indigo-300',violet:'border-violet-300',cyan:'border-cyan-300',gray:'border-gray-300',yellow:'border-yellow-300'};
const T_TX={emerald:'text-emerald-800',teal:'text-teal-800',sky:'text-sky-800',blue:'text-blue-800',amber:'text-amber-800',orange:'text-orange-800',red:'text-red-800',slate:'text-slate-700',green:'text-green-800',rose:'text-rose-800',pink:'text-pink-800',purple:'text-purple-800',fuchsia:'text-fuchsia-800',indigo:'text-indigo-800',violet:'text-violet-800',cyan:'text-cyan-800',gray:'text-gray-700',yellow:'text-yellow-800'};

const T=({id,big=false})=>{
  const t=TERMS[id];if(!t)return null;
  return<span title={t.ru} aria-label={t.ru}
    className={`term-badge inline-flex items-center gap-1 rounded-md border font-bold align-middle ${big?'px-3 py-1.5 text-xs':'px-1.5 py-0.5 text-[11px]'} ${T_BG[t.c]} ${T_BD[t.c]} ${T_TX[t.c]}`}
  ><Ar className="leading-tight">{t.ar}</Ar></span>;
};

const Tbl=memo(({headers,rows,rCls})=>(
  <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm w-full">
    <table className="w-full text-center text-sm" style={{minWidth:'320px'}} role="table">
      <thead className="bg-gray-100 text-gray-700 font-bold text-[10px] uppercase">
        <tr>{headers.map((h,i)=><th key={i} scope="col" className="p-2 border-b-2 border-r last:border-r-0 border-gray-200">{h}</th>)}</tr>
      </thead>
      <tbody className="bg-white">
        {rows.map((r,i)=><tr key={i} className={`border-b border-gray-50 ${rCls?rCls(r):''}`}>
          {r.cells.map((cell,j)=><td key={j} className="p-2 border-r last:border-r-0 border-gray-100">{cell}</td>)}
        </tr>)}
      </tbody>
    </table>
  </div>
));

/* ══════════ ARROW CONNECTOR COMPONENTS ══════════ */
const CLink=({c='emerald',h=8})=><div className={`w-0.5 bg-${c}-400 mx-auto z-0`} style={{height:`${h*4}px`}}></div>;

const V2down=({c='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-1/2 w-0.5 h-4 bg-${c}-400 -ml-px`}></div>
    <div className={`absolute top-4 left-[calc(25%-6px)] right-[calc(25%-6px)] h-0.5 bg-${c}-400`}></div>
    <div className={`absolute top-4 left-[calc(25%-6px)] w-0.5 h-4 bg-${c}-400`}></div>
    <div className={`absolute top-4 right-[calc(25%-6px)] w-0.5 h-4 bg-${c}-400`}></div>
  </div>
);
const V2up=({tc='emerald',bc='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-[calc(25%-6px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-0 right-[calc(25%-6px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-[calc(25%-6px)] right-[calc(25%-6px)] h-0.5 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-1/2 w-0.5 h-4 bg-${bc}-400 -ml-px`}></div>
  </div>
);
const V3down=({c='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-1/2 w-0.5 h-4 bg-${c}-400 -ml-px`}></div>
    <div className={`absolute top-4 left-[calc(16.666%-8px)] right-[calc(16.666%-8px)] h-0.5 bg-${c}-400`}></div>
    <div className={`absolute top-4 left-[calc(16.666%-8px)] w-0.5 h-4 bg-${c}-400`}></div>
    <div className={`absolute top-4 left-1/2 w-0.5 h-4 bg-${c}-400 -ml-px`}></div>
    <div className={`absolute top-4 right-[calc(16.666%-8px)] w-0.5 h-4 bg-${c}-400`}></div>
  </div>
);
const V3up=({tc='emerald',bc='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-[calc(16.666%-8px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-0 left-1/2 w-0.5 h-4 bg-${tc}-400 -ml-px`}></div>
    <div className={`absolute top-0 right-[calc(16.666%-8px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-[calc(16.666%-8px)] right-[calc(16.666%-8px)] h-0.5 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-1/2 w-0.5 h-4 bg-${bc}-400 -ml-px`}></div>
  </div>
);

const BHead=({ar,ru,bg='emerald',lesson})=>(
  <div className={`inline-block bg-${bg}-50 px-4 py-2 rounded-xl border border-${bg}-200 shadow-sm z-10 text-center w-full`}>
    {lesson&&<div className={`text-[9px] font-bold bg-${bg}-100 text-${bg}-700 border border-${bg}-200 rounded-full px-2 py-0.5 inline-block mb-1`}>Урок {lesson}</div>}
    <h2 className={`text-lg font-bold font-ar text-${bg}-800`}><Ar>{ar}</Ar></h2>
    <p className={`text-[9px] font-normal uppercase text-${bg}-600 tracking-widest`}>({ru})</p>
  </div>
);
const LBadge=({n})=>(
  <span className="inline-block px-2 py-0.5 rounded-full text-[9px] font-bold bg-emerald-100 text-emerald-700 border border-emerald-200 mb-1">
    Урок {n}
  </span>
);
const IBox=({children,color='emerald'})=>(
  <div className={`bg-${color}-50 border border-${color}-200 rounded-lg p-2 text-[11px] text-${color}-900 leading-relaxed`}>{children}</div>
);
const RBox=({children})=>(
  <div className="bg-amber-50 border border-amber-300 rounded-lg p-2 text-[11px] text-amber-900 font-bold text-center leading-relaxed">{children}</div>
);
const Ex=({ar,ru})=>(
  <div className="flex items-baseline gap-2 py-0.5 flex-wrap">
    <Ar className="text-sm font-bold text-gray-800">{ar}</Ar>
    {ru&&<span className="text-[11px] text-gray-500">— {ru}</span>}
  </div>
);

/* ══════════ DATA ══════════ */
const PAST=[
  {pr:'أَنَا',ru:'Я',verb:'ذَهَبْتُ',rule:'+تُ',more:'قَرَأْتُ',p:1},
  {pr:'نَحْنُ',ru:'Мы',verb:'ذَهَبْنَا',rule:'+نَا',more:'قَرَأْنَا',p:1},
  {pr:'أَنْتَ',ru:'Ты (м.р.)',verb:'ذَهَبْتَ',rule:'+تَ',more:'قَرَأْتَ',p:2},
  {pr:'أَنْتِ',ru:'Ты (ж.р.)',verb:'ذَهَبْتِ',rule:'+تِ',more:'قَرَأْتِ',p:2},
  {pr:'أَنْتُمَا',ru:'Вы двое',verb:'ذَهَبْتُمَا',rule:'+تُمَا',more:'قَرَأْتُمَا',p:2},
  {pr:'أَنْتُمْ',ru:'Вы (м.р.)',verb:'ذَهَبْتُمْ',rule:'+تُمْ',more:'قَرَأْتُمْ',p:2,muz:true},
  {pr:'أَنْتُنَّ',ru:'Вы (ж.р.)',verb:'ذَهَبْتُنَّ',rule:'+تُنَّ',more:'قَرَأْتُنَّ',p:2,muan:true},
  {pr:'هُوَ',ru:'Он',verb:'ذَهَبَ',rule:'основа',more:'قَرَأَ — أَكَلَ',p:3,muz:true},
  {pr:'هِيَ',ru:'Она',verb:'ذَهَبَتْ',rule:'+تْ',more:'قَرَأَتْ',p:3,muan:true},
  {pr:'هُمَا',ru:'Они 2',verb:'ذَهَبَا',rule:'+ا',more:'سَكَنَا',p:3},
  {pr:'هُمْ',ru:'Они (м.р.)',verb:'ذَهَبُوا',rule:'+وا',more:'قَرَأُوا',p:3,muz:true},
  {pr:'هُنَّ',ru:'Они (ж.р.)',verb:'ذَهَبْنَ',rule:'+نَ',more:'قَرَأْنَ',p:3,muan:true},
];
const PRESENT=[
  {pr:'أَنَا',ru:'Я',verb:'أَذْهَبُ',rule:'أَ+',more:'أَقْرَأُ — آكُلُ',p:1},
  {pr:'نَحْنُ',ru:'Мы',verb:'نَذْهَبُ',rule:'نَ+',more:'نَقْرَأُ',p:1},
  {pr:'أَنْتَ',ru:'Ты (м.р.)',verb:'تَذْهَبُ',rule:'تَ+',more:'تَقْرَأُ',p:2,muz:true},
  {pr:'أَنْتِ',ru:'Ты (ж.р.)',verb:'تَذْهَبِينَ',rule:'تَـ...ـِينَ',more:'',p:2,muan:true},
  {pr:'أَنْتُمَا',ru:'Вы двое',verb:'تَذْهَبَانِ',rule:'تَـ...ـَانِ',more:'',p:2},
  {pr:'أَنْتُمْ',ru:'Вы (м.р.)',verb:'تَذْهَبُونَ',rule:'تَـ...ـُونَ',more:'',p:2,muz:true},
  {pr:'أَنْتُنَّ',ru:'Вы (ж.р.)',verb:'تَذْهَبْنَ',rule:'تَـ...ـْنَ',more:'',p:2,muan:true},
  {pr:'هُوَ',ru:'Он',verb:'يَذْهَبُ',rule:'يَ+',more:'يَقْرَأُ',p:3,muz:true},
  {pr:'هِيَ',ru:'Она',verb:'تَذْهَبُ',rule:'تَ+',more:'',p:3,muan:true},

/* ══════════ ZOOM PANEL ══════════ */
const ZoomPanel=({scale,zoomIn,zoomOut,resetZoom})=>{
  const [pos,setPos]=useState({top:16,right:16,left:'auto'});
  const [drag,setDrag]=useState(false);
  const ref=useRef(null);
  const info=useRef({});
  const moved=useRef(false);

  const onDown=e=>{
    if(e.target.closest('button'))return;
    e.preventDefault();
    e.stopPropagation();setDrag(true);moved.current=false;
    const r=ref.current.getBoundingClientRect();
    info.current={sx:e.clientX,sy:e.clientY,rl:r.left,rt:r.top};
    setPos({top:r.top,left:r.left,right:'auto'});
  };

  useEffect(()=>{
    const onMove=e=>{
      if(!drag)return;
      const dx=e.clientX-info.current.sx,dy=e.clientY-info.current.sy;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved.current=true;
      setPos({top:info.current.rt+dy,left:info.current.rl+dx,right:'auto'});
    };
    const onUp=()=>{
      if(!drag)return;setDrag(false);
      moved.current=false; 
      if(ref.current){
        const r=ref.current.getBoundingClientRect();
        const il=r.left+r.width/2<window.innerWidth/2;
        setPos({top:r.top,...(il?{left:16,right:'auto'}:{right:16,left:'auto'})});
      }
    };
    if(drag){
      window.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp);
      window.addEventListener('pointercancel',onUp);
      document.body.style.userSelect='none';
    }
    return()=>{
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
      window.removeEventListener('pointercancel',onUp);
      document.body.style.userSelect='';
    };
  },[drag]);

  const kh=fn=>e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();if(!moved.current)fn();}};
  const bc="zp-btn";
  return(
    <div ref={ref} onPointerDown={onDown}
      className={`zoom-panel-base${drag?' dragging':''}`}
      style={{top:pos.top,left:pos.left,right:pos.right}}
      role="toolbar" aria-label="Масштаб">
      <button className={bc} onClick={e=>{e.stopPropagation();if(!moved.current)zoomOut();}} onKeyDown={kh(zoomOut)} aria-label="Уменьшить" title="-">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span className="zp-pct" aria-live="polite">{Math.round(scale*100)}%</span>
      <button className={bc} onClick={e=>{e.stopPropagation();if(!moved.current)zoomIn();}} onKeyDown={kh(zoomIn)} aria-label="Увеличить" title="+">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <div className="zp-sep"></div>
      <button className={bc} onClick={e=>{e.stopPropagation();if(!moved.current)resetZoom();}} onKeyDown={kh(resetZoom)} aria-label="Сбросить" title="100%">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  );
};

const LH=({n,ar,sub})=>(
  <div className="mb-4 pt-1">
    <div className="flex items-center gap-2 mb-1 flex-wrap">
      <span className="bg-emerald-600 text-white text-[11px] font-bold px-3 py-0.5 rounded-full shrink-0">УРОК {n}</span>
      <Ar className="text-lg font-bold text-stone-800">{ar}</Ar>
    </div>
    {sub&&<div className="text-sm font-bold text-stone-700 mt-0.5">{sub}</div>}
  </div>
);

const P=({children,cl=''})=><p className={`mb-3 text-sm leading-relaxed text-stone-800 ${cl}`}>{children}</p>;
const H3=({children})=><h3 className="text-sm font-bold text-stone-800 mb-2 mt-4 flex items-center gap-2 flex-wrap">{children}</h3>;
const H4=({children})=><h4 className="text-xs font-semibold text-stone-700 mb-1.5 mt-3 flex items-center gap-2 flex-wrap">{children}</h4>;
const Exa=({items})=>(
  <div className="my-2 bg-stone-100 rounded-xl p-2.5 space-y-2 border border-stone-200">
    {items.map(([ar,ru],i)=><div key={i} className="flex items-center gap-2 flex-wrap">
      <Ar className="text-[16px] font-bold text-stone-900">{ar}</Ar>
      {ru&&<span className="text-[12px] text-stone-500 leading-tight">— {ru}</span>}
    </div>)}
  </div>
);
const DefBox=({ar,ru})=>(
  <div className="my-2 bg-amber-50 border border-amber-200 rounded-xl p-2.5">
    {ar&&<Ar className="text-sm font-bold text-amber-900 block text-center mb-1">{ar}</Ar>}
    {ru&&<p className="text-[12px] text-amber-800 text-center italic">{ru}</p>}
  </div>
);
const NoteBox=({children})=><div className="my-2 bg-blue-50 border-l-4 border-blue-300 pl-3 py-2 text-[12px] text-blue-800 rounded-r leading-relaxed">{children}</div>;
const RuleBox=({children})=><div className="my-2 bg-emerald-50 border border-emerald-200 rounded-xl p-2.5 text-[12px] text-emerald-800 font-medium leading-relaxed">{children}</div>;
const NumItem=({n,children})=><div className="flex gap-2 mb-2 items-start">
  <span className="text-emerald-600 font-bold text-[12px] min-w-[1.2rem] pt-0.5">{n}.</span>

const LText1=()=>(
  <div>
    <LH n="1" ar="الْكَلِمَةُ — أَقْسَامُ الْكَلَامِ" sub="Слово и его виды" />
    <P>Арабская грамматика состоит из 2 основных разделов:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><T id="nahw" /> — изучает <strong>окончание</strong> слов.</NumItem>
      <NumItem n="٢"><T id="sarf" /> — изучает <strong>основу</strong> слов.</NumItem>
    </div>
    <H3><T id="kalima" big /> — Слово</H3>
    <DefBox ar="الْكَلِمَةُ هِيَ اللَّفْظُ الدَّالُّ عَلَى مَعْنًى مُفْرَدٍ" ru="Слово — это высказывание (звук), указывающее на единичное значение." />
    <Exa items={[['مُحَمَّدٌ','Мухаммад'],['مَسْجِدٌ','мечеть'],['ذَهَبَ','ушел'],['مِنْ','из']]} />
    <P>Слово бывает только <strong>трех видов</strong>:</P>
    
    <H3>١. Имя <T id="ism" big /></H3>
    <P>Это слово, имеющее смысл, но <strong>не связанное со временем</strong>.</P>
    <Exa items={[['مُحَمَّدٌ','Мухаммад'],['بَيْتٌ','Дом']]} />
    
    <H3>٢. Глагол <T id="fiil" big /></H3>
    <P>Это слово, имеющее смысл и <strong>связанное со временем</strong>. Подразделяется на три вида:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><T id="madi" /> (прошедшее время)</NumItem>
      <NumItem n="٢"><T id="mudari" /> (настоящее и будущее время)</NumItem>
      <NumItem n="٣"><T id="amr" /> (приказ / повелительное наклонение)</NumItem>
    </div>
    <NoteBox>Примечание: из настоящего времени можно сделать будущее путем добавления специальных букв — это отдельная тема.</NoteBox>
    <Exa items={[['ذَهَبَ','ушел'],['يَذْهَبُ','идет'],['اِذْهَبْ','иди']]} />

    <H3>٣. Частица <T id="harf" big /></H3>
    <P>Это слово, которое <strong>не имеет полного смысла само по себе</strong> (без нахождения в предложении) и не связано со временем. Сюда относятся предлоги, союзы и т.д.</P>
    <Exa items={[['فِي','в'],['مِنْ','из'],['عَلَى','на']]} />
    <P>Пояснение: Сама по себе частица, например <Ar className="font-bold text-emerald-800">فِي</Ar> (в), не несет законченной информации, но ее смысл выявляется в предложении:</P>
    <DefBox ar="مُحَمَّدٌ فِي الْبَيْتِ" ru="Мухаммад в доме. (Здесь роль и смысл частицы стали понятны)." />

    <H3>Основные отличительные признаки</H3>
    <P>Эти признаки помогают различить части речи:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><strong>Признаки Имени (<Ar>اسم</Ar>):</strong> Только имена могут принимать артикль <Ar className="font-bold">ال</Ar> и танвин (<Ar>ـٌ ـً ـٍ</Ar>).</NumItem>
      <NumItem n="٢"><strong>Различие в окончаниях:</strong><br/>
      • В конце Имени (<Ar>اسم</Ar>) никогда не ставится сукун <Ar className="text-red-600 font-bold">ـْ</Ar>.<br/>
      • В конце Глагола (<Ar>فعل</Ar>) никогда не ставится кясра <Ar className="text-red-600 font-bold">ـِ</Ar>.<br/>
      <span className="text-gray-500 text-xs">(То есть кясра не свойственна глаголам, а сукун не свойственен именам).</span>
      </NumItem>
    </div>
  </div>
);

const LText2=()=>(
  <div>
    <LH n="2" ar="الْمُعْرَبُ وَالْمَبْنِيُّ" sub="Изменяемость и неизменяемость" />
    <P>Виды слов по изменяемости и неизменяемости: слово (<T id="kalima" />) бывает двух видов: либо <T id="murab" /> (изменяемое слово), либо <T id="mabni" /> (неизменяемое слово).</P>
    
    <H3>١. <T id="murab" big /> (Изменяемость/Склонение)</H3>
    <DefBox ru="Это изменение окончания слов по причине различных действующих факторов, которые влияют на эти слова." />
    <P>Примеры:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><Ar className="font-bold text-base text-emerald-800">هَذَا بَيْتٌ</Ar> (Это дом). Здесь стоит <Ar className="font-bold text-red-600">ـٌ</Ar>, потому что это <Ar>خَبَر</Ar> (сказуемое).</NumItem>
      <NumItem n="٢"><Ar className="font-bold text-base text-emerald-800">رَأَيْتُ بَيْتًا</Ar> (Я увидел дом). Здесь стоит <Ar className="font-bold text-red-600">ـً</Ar>, потому что это <Ar>مَفْعُولٌ بِهِ</Ar> (объект действия).</NumItem>
      <NumItem n="٣"><Ar className="font-bold text-base text-emerald-800">مَرَرْتُ بِبَيْتٍ</Ar> (Я прошел мимо дома). Здесь стоит <Ar className="font-bold text-red-600">ـٍ</Ar>, потому что это <Ar>اِسْمٌ مَجْرُورٌ</Ar> (имя в родительном падеже после предлога).</NumItem>
    </div>

    <H3>٢. <T id="mabni" big /> (Неизменяемость)</H3>
    <DefBox ru="Это неизменяемость окончания слова, несмотря на факторы, действующие на него, и несмотря на его положение внутри предложения." />
    <P>Примеры:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><Ar className="font-bold text-base text-rose-800">جَاءَ هَؤُلَاءِ</Ar> (Пришли эти).</NumItem>
      <NumItem n="٢"><Ar className="font-bold text-base text-rose-800">رَأَيْتُ هَؤُلَاءِ</Ar> (Я увидел этих).</NumItem>
      <NumItem n="٣"><Ar className="font-bold text-base text-rose-800">مَرَرْتُ بِهَؤُلَاءِ</Ar> (Я прошел мимо этих).</NumItem>
    </div>
    <P className="text-xs text-gray-500 italic">(Окончание слова «هَؤُلَاءِ» не изменилось, всегда кясра).</P>

    <H3>Какие слова являются неизменяемыми?</H3>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><strong>الْحَرْف</strong> (Частица) — Все частицы являются مَبْنِي.</NumItem>
      <NumItem n="٢"><strong>الْفِعْل</strong> (Глагол):<br/>
      • الْمَاضِي (прошедшее) и الْأَمْر (приказ) — <strong>всегда</strong> مَبْنِي.<br/>
      • الْمُضَارِع (настоящее/будущее) — является مَبْنِي только в 2 случаях, в остальных он مُعْرَب.
      </NumItem>
    </div>
    <Exa items={[['جَاءَ / قَرَأَ / ذَهَبَ / أَكَلَ','Примеры الماضي'],['كُلْ / اِذْهَبْ / اُخْرُجْ','Примеры الأمر']]} />

    <H4>3. الِاسْم (Имя)</H4>
    <P>Основа в именах — это مُعْرَب, но есть группы имен, которые всегда مَبْنِي. Мы пройдем 6 основных видов:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><strong>الضَّمَائِر</strong> (Местоимения): Все они (слитные и раздельные) неизменяемы. <Ar className="font-bold text-gray-600">أَنْتَ، كِتَابُكَ</Ar></NumItem>
      <NumItem n="٢"><strong>أَسْمَاءُ الْإِشَارَة</strong> (Указательные): <Ar className="font-bold text-gray-600">هَذَا، هَذِهِ</Ar></NumItem>
      <NumItem n="٣"><strong>الْأَسْمَاءُ الْمَوْصُولَة</strong> (Относительные): <Ar className="font-bold text-gray-600">الَّذِي، الَّتِي</Ar></NumItem>
      <NumItem n="٤"><strong>أَسْمَاءُ الشَّرْط</strong> (Условные): <Ar className="font-bold text-gray-600">مَنْ، أَيْنَ</Ar></NumItem>
      <NumItem n="٥"><strong>بَعْضُ الظُّرُوف</strong> (Некоторые обстоятельства/наречия): <Ar className="font-bold text-gray-600">أَمْسِ، حَيْثُ</Ar></NumItem>
      <NumItem n="٦"><strong>أَسْمَاءُ الِاسْتِفْهَام</strong> (Вопросительные): <Ar className="font-bold text-gray-600">مَتَى، كَيْفَ</Ar></NumItem>
    </div>
  </div>
);

const LText3=()=>(
  <div>
    <LH n="3" ar="الْإِعْرَابُ — التَّطْبِيقُ" sub="Грамматический разбор слов" />
    <P>Грамматический разбор зависит от того, к какому виду относится слово: <T id="mabni" /> (Неизменяемое) или <T id="murab" /> (Изменяемое).</P>
    
    <H3>1. Разбор неизменяемых слов (<Ar>الْمَبْنِي</Ar>)</H3>
    <P>Для الْمَبْنِي все легко: мы смотрим на последнюю ташкиль слова. Если это <Ar className="font-bold">ـُ</Ar>, то говорим: <Ar className="font-bold text-emerald-800">مَبْنِيٌّ عَلَى الضَّمِّ</Ar> и так далее со всеми ташкилями (кроме шадды, так как оно не участвует в этом).</P>

    <H3>2. Разбор изменяемых слов (<Ar>الْمُعْرَب</Ar>)</H3>
    <P>Для الْمُعْرَب разбор чуть сложнее: сначала определяется грамматическое состояние слова (<T id="hal" />), а затем его огласовка/признак (<Ar className="font-bold">عَلَامَةٌ</Ar>).</P>

    <H4>Что такое грамматическое состояние (حَالَةٌ)?</H4>
    <P>Для изменяемых слов существует 4 состояния:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><T id="rafaa" /> (именительный падеж). Бывает только у <Ar>الِاسْم</Ar> и <Ar>الْفِعْل الْمُضَارِع</Ar>. Основной признак: <Ar className="font-bold text-red-600">ـُ</Ar> или <Ar className="font-bold text-red-600">ـٌ</Ar>.</NumItem>
      <NumItem n="٢"><T id="nasb" /> (винительный падеж). Бывает только у <Ar>الِاسْم</Ar> и <Ar>الْفِعْل الْمُضَارِع</Ar>. Основной признак: <Ar className="font-bold text-red-600">ـَ</Ar> или <Ar className="font-bold text-red-600">ـً</Ar>.</NumItem>
      <NumItem n="٣"><T id="jarr" /> (родительный падеж). Бывает <strong>только у</strong> <Ar>الِاسْم</Ar>. Основной признак: <Ar className="font-bold text-red-600">ـِ</Ar> или <Ar className="font-bold text-red-600">ـٍ</Ar>.</NumItem>
      <NumItem n="٤"><T id="jazm" /> (усеченное наклонение). Бывает <strong>только у</strong> <Ar>الْفِعْل الْمُضَارِع</Ar>. Основной признак: <Ar className="font-bold text-red-600">ـْ</Ar>.</NumItem>
    </div>

    <P className="font-bold mt-4">Есть два общих метода определения:</P>
    <ul className="list-disc pl-5 text-sm text-gray-700 mb-3 space-y-1">
      <li><strong>1 Метод:</strong> есть ли внешние признаки (например, ال или танвин).</li>
      <li><strong>2 Метод:</strong> связано ли оно со временем, имеет ли смысл само по себе и т.д.</li>
    </ul>

    <H3>Примеры грамматического разбора на практике</H3>
    
    <div className="my-3 bg-violet-50 border border-violet-200 rounded-xl p-3">
      <Ar className="text-xl font-bold text-violet-900 block mb-1">١. بَيْتٌ</Ar>
      <P className="text-xs mb-1"><strong>Разбор:</strong> Здесь есть танвин, значит это اِسْم. Оно не относится к 6 видам неизменяемых имен, значит оно مُعْرَب.</P>
      <P className="text-xs font-bold text-violet-800">Состояние: Находится в الرَّفْع (оканчивается на ـٌ).</P>
    </div>

    <div className="my-3 bg-violet-50 border border-violet-200 rounded-xl p-3">
      <Ar className="text-xl font-bold text-violet-900 block mb-1">٢. يَذْهَبُ</Ar>
      <P className="text-xs mb-1"><strong>Вид:</strong> Связано со временем и имеет смысл — значит глагол (مضارع).</P>
      <P className="text-xs mb-1"><strong>Тип:</strong> مضارع в основе مُعْرَب, кроме 2 случаев. Это не исключение.</P>
      <P className="text-xs font-bold text-violet-800">Состояние: Находится в الرَّفْع (оканчивается на ـُ).</P>
    </div>

    <div className="my-3 bg-violet-50 border border-violet-200 rounded-xl p-3">
      <Ar className="text-xl font-bold text-violet-900 block mb-1">٣. مُحَمَّدًا</Ar>
      <P className="text-xs mb-1"><strong>Вид и Тип:</strong> Это اِسْم (есть ـً). Оно مُعْرَب.</P>
      <P className="text-xs font-bold text-violet-800">Состояние: Находится в النَّصْب (оканчивается на ـً).</P>
    </div>

    <div className="my-3 bg-violet-50 border border-violet-200 rounded-xl p-3">
      <Ar className="text-xl font-bold text-violet-900 block mb-1">٤. كِتَابٍ</Ar>
      <P className="text-xs mb-1"><strong>Вид и Тип:</strong> Это اِسْم (есть ـٍ). Оно مُعْرَب.</P>
      <P className="text-xs font-bold text-violet-800">Состояние: Находится в الْجَرّ (оканчивается на ـٍ).</P>
    </div>

    <div className="my-3 bg-violet-50 border border-violet-200 rounded-xl p-3">
      <Ar className="text-xl font-bold text-violet-900 block mb-1">٥. لَمْ يَذْهَبْ</Ar>
      <P className="text-xs italic text-gray-500 mb-1">(Примечание: в основе глагол был с даммой — يَذْهَبُ, но частица لَمْ сделала его с сукуном).</P>
      <P className="text-xs mb-1"><strong>Вид и Тип:</strong> Это فِعْل, потому что у اِسْم никогда не будет ـْ. Оно مُعْرَب (не исключение).</P>
      <P className="text-xs font-bold text-violet-800">Состояние: Находится в الْجَزْم (оканчивается на ـْ).</P>
    </div>
  </div>
);

const LText4=()=>(
  <div>
    <LH n="4" ar="الْمُذَكَّرُ وَالْمُؤَنَّثُ" sub="Род в арабском языке" />
    <RuleBox>В основе все слова в арабском языке относятся к мужскому роду (الْمُذَكَّر), и для этого не нужны доказательства. Но для того чтобы сказать, что слово женского рода (الْمُؤَنَّث), нужны доказательства (определенные признаки).</RuleBox>
    
    <H3>Признаки женского рода</H3>
    
    <H4>١. Окончание «ة» (التَّاءُ الْمَرْبُوطَة)</H4>
    <Exa items={[['عَائِشَةُ','Аиша'],['جَمِيلَةٌ','красивая'],['سَيَّارَةٌ','машина']]} />
    <P>Если слово оканчивается на ة, то в 99% случаев это مُؤَنَّث. Оставшийся 1% — это исключения (мужские имена):</P>
    <Exa items={[['أُسَامَةُ','Усама'],['حَمْزَةُ','Хамза']]} />

    <H4>٢. Окончание «ى» (الْأَلِفُ الْمَقْصُورَة)</H4>
    <Exa items={[['هُدَى','Худа (если в значении женского имени то مُؤَنَّث, если в значении прямого пути то مُذَكَّر)'],['سَلْمَى','Сальма'],['بُشْرَى','радостная весть']]} />
    <P>В 99% случаев это مُؤَنَّث. Есть 1% исключений, но их очень мало.</P>

    <H4>٣. Окончание «اء» (الْأَلِفُ الْمَمْدُودَة)</H4>
    <Exa items={[['بَيْضَاءُ','белая'],['صَحْرَاءُ','пустыня'],['حَمْرَاءُ','красная']]} />
    <P>В 100% случаев это слово женского рода (مُؤَنَّث).</P>

    <H3>Женский род по смыслу и употреблению</H3>
    <P>Если слово указывает на лицо женского пола, оно является именем женского рода, даже если не имеет внешнего признака:</P>
    <Exa items={[['بِنْتٌ','девочка / дочь'],['حَامِلٌ','беременная'],['أُمٌّ','мать'],['مَرْيَمُ','Марьям']]} />
    
    <P>Также есть слова, которые относятся к женскому роду лишь <strong>по употреблению</strong>. У них нет признаков и они не лица женского пола:</P>
    <div className="grid grid-cols-2 gap-2 mt-2 mb-3">
      <div className="bg-pink-50 border border-pink-200 rounded-xl p-2">
        <div className="text-[10px] font-bold text-pink-700 mb-1">Названия племен:</div>
        <Exa items={[['قُرَيْش','Курайш'],['قَحْطَان','Кахтан']]} />
      </div>
      <div className="bg-pink-50 border border-pink-200 rounded-xl p-2">
        <div className="text-[10px] font-bold text-pink-700 mb-1">Народы:</div>
        <Exa items={[['الرُّوس','Русские'],['الْكَازَاخ','Казахи']]} />
      </div>
      <div className="bg-pink-50 border border-pink-200 rounded-xl p-2">
        <div className="text-[10px] font-bold text-pink-700 mb-1">Города:</div>
        <Exa items={[['مُوسْكُو','Москва'],['أَلْمَاتِي','Алматы']]} />
      </div>
      <div className="bg-pink-50 border border-pink-200 rounded-xl p-2">
        <div className="text-[10px] font-bold text-pink-700 mb-1">Страны:</div>
        <Exa items={[['رُوسِيَا','Россия'],['كَازَاخِسْتَان','Казахстан']]} />
      </div>
    </div>

    <H3>Части тела</H3>
    <P><strong>Парные</strong> части тела человека относятся к женскому роду:</P>
    <Exa items={[['يَدٌ','рука'],['عَيْنٌ','глаз'],['أُذُنٌ','ухо']]} />
    <P><strong>Непарные</strong> части тела относятся к мужскому роду:</P>
    <Exa items={[['أَنْفٌ','нос'],['رَأْسٌ','голова']]} />
  </div>
);

const LText5=()=>(
  <div>
    <LH n="5" ar="عَدَدُ الِاسْمِ" sub="Количественные числа существительного" />
    <P>Имя (الِاسْم) в арабском языке по числу делится на три вида: <T id="mufrad" /> (единственное), <T id="musanna" /> (двойственное), <T id="jamaa" /> (множественное).</P>
    
    <H3>1. Единственное число (<T id="mufrad" big />)</H3>
    <DefBox ar="الْمُفْرَدُ هُوَ مَا دَلَّ عَلَى وَاحِدٍ أَوْ وَاحِدَةٍ" ru="Единственное число — это то, что указывает на одного (طَالِبٌ) или одну (طَالِبَةٌ)." />

    <H3>2. Двойственное число (<T id="musanna" big />)</H3>
    <DefBox ar="الْمُثَنَّى هُوَ مَا دَلَّ عَلَى اثْنَيْنِ أَوِ اثْنَتَيْنِ بِزِيَادَةِ أَلِفٍ وَنُونٍ أَوْ يَاءٍ وَنُونٍ عَلَى مُفْرَدِهِ" ru="Указывает на два или две с добавлением (ـَانِ) или (ـَيْنِ) к единственному числу." />
    
    <RuleBox>Важное правило: перед добавлением окончаний двойственного числа последняя огласовка слова меняется на фатху (<Ar>ـَ</Ar>), а затем добавляется <Ar className="text-red-600 font-bold">ـَانِ</Ar> или <Ar className="text-red-600 font-bold">ـَيْنِ</Ar>.</RuleBox>
    <Exa items={[['بَيْتٌ ← بَيْتَانِ','два дома'],['مُسْلِمٌ ← مُسْلِمَانِ','два мусульманина']]} />
    
    <P className="font-bold text-stone-800">Правило для (ة):</P>
    <P>Если слово оканчивается на ة, то при образовании двойственного числа она раскрывается/заменяется на букву ت.</P>
    <Exa items={[['سَيَّارَةٌ ← سَيَّارَتَانِ','две машины']]} />

    <H3>Грамматические состояния двойственного числа</H3>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><strong>Состояние <T id="rafaa" /></strong><br/>
      Основным признаком الرَّفْع является дамма или танвин дамма и то, что их заменяет. В нашем случае то, что их заменяет — это фатха.<br/>
      <Ar className="font-bold text-emerald-800 block text-lg my-1">الْمُعَلِّمَانِ<span className="text-red-600 text-sm">¹</span> مَاهِرَانِ<span className="text-red-600 text-sm">²</span></Ar>
      (Два учителя¹ искусны²/умелы²).<br/>
      الْمُعَلِّمَانِ — это مُبْتَدَأٌ (подлежащее). مَاهِرَانِ — это خَبَرٌ (сказуемое). Оба всегда должны быть в состоянии الرَّفْع.<br/>
      <span className="text-xs text-gray-500 italic">Признаком الرَّفْع здесь является алиф (ا), потому что в двойственном числе слово в состоянии الرَّفْع бывает только с ا.</span>
      </NumItem>
      
      <NumItem n="٢"><strong>Состояния <T id="nasb" /> и <T id="jarr" /></strong><br/>
      В двойственном числе основные признаки заменяются, и к слову добавляется окончание <Ar className="text-red-600 font-bold">ـَيْنِ</Ar> (признак — ي).<br/>
      <strong>Пример النَّصْب:</strong> <Ar className="font-bold text-emerald-800">رَأَيْتُ رَجُلَيْنِ</Ar> (Я видел двух мужчин). Слово رَجُلَيْنِ в состоянии النَّصْب, так как это مَفْعُولٌ بِهِ (объект действия).<br/>
      <strong>Пример الْجَرّ:</strong> <Ar className="font-bold text-emerald-800">فَرِحْتُ بِهَدِيَّتَيْنِ</Ar> (Я обрадовался двум подаркам). Слово هَدِيَّتَيْنِ в состоянии الْجَرّ, так как перед ним стоит حَرْفُ جَرٍّ (предлог بِـ).
      </NumItem>
    </div>
  </div>
);

const LText6=()=>(
  <div>
    <LH n="6" ar="جَمْعُ الْمُذَكَّرِ السَّالِمِ" sub="Правильное мужское мн. число" />
    <P>Если мы хотим преобразовать слово во множественное число, мы используем один из трех видов:</P>
    <ul className="list-disc pl-5 mb-3 text-sm space-y-2">
      <li><T id="jam_muzakkar" /> (Правильное мужское)</li>
      <li><T id="jam_muannas" /> (Правильное женское)</li>
      <li><T id="jam_taksir" /> (Ломаное)</li>
    </ul>

    <H3>١. <T id="jam_muzakkar" big /></H3>
    <P>Его также называют правильным или здоровым. Образуется путем добавления к концу слова в единственном числе:</P>
    <ul className="list-disc pl-5 mb-2 text-sm">
      <li>Окончания <Ar className="font-bold text-blue-700">ـُونَ</Ar> — если слово в состоянии الرَّفْع.</li>
      <li>Окончания <Ar className="font-bold text-blue-700">ـِينَ</Ar> — если слово в состоянии النَّصْب или الْجَرّ.</li>
    </ul>
    <Exa items={[['مُسْلِمٌ ← مُسْلِمُونَ / مُسْلِمِينَ','мусульмане'],['مُدَرِّسٌ ← مُدَرِّسُونَ / مُدَرِّسِينَ','учителя'],['مُهَنْدِسٌ ← مُهَنْدِسِينَ','инженеров / инженерам']]} />
    
    <P className="font-bold mt-3">Почему этот вид назвали «правильным/здоровым»?</P>
    <P>Потому что при переходе во множественное число все буквы корня сохраняются в целости, к ним просто добавляется окончание.</P>

    <H3>Условия для образования:</H3>
    <div className="my-2 space-y-1.5">
      <NumItem n="١">Слово должно быть <strong>мужского рода</strong> (مُذَكَّر).</NumItem>
      <NumItem n="٢">Слово должно быть <strong>«разумным» (عَاقِل)</strong>. В арабском языке к разумным относятся те, кто обладает разумом и волей. Остальные предметы и животные — неразумные (غَيْرُ عَاقِل).</NumItem>
    </div>
    
    <NoteBox>
      <strong>Важное примечание:</strong> по отношению к Аллаху хоть и употребляются частицы для разумного, но из-за адаба мы не относим Аллаха в категорию разумных из соображений осторожности, потому что это не пришло ни в Коране, ни в Сунне. Поэтому мы придерживаемся пути Ибн Хишама.
    </NoteBox>
    <NoteBox>
      <strong>Исключение:</strong> Даже если слово мужского рода и разумное, оно не всегда образует правильное множественное число. Иногда оно образует ломаное (جَمْعُ التَّكْسِيرِ).<br/>
      Пример: <Ar className="font-bold">طَالِبٌ ← طُلَّابٌ</Ar> (студенты).
    </NoteBox>

    <P>Слова, которые полностью подходят под правило:</P>
    <Exa items={[['مُؤْمِنٌ ← مُؤْمِنُونَ','верующие'],['مُسَافِرٌ ← مُسَافِرُونَ','путники']]} />
  </div>
);

const LText7=()=>(
  <div>
    <LH n="7" ar="جَمْعُ الْمُؤَنَّثِ السَّالِمِ وَجَمْعُ التَّكْسِيرِ" sub="Женское и ломаное мн. число" />
    <H3>٢. <T id="jam_muannas" big /></H3>
    <P>Правильное («здоровое») множественное число женского рода. Образуется путем добавления в конец слова окончания <Ar className="text-red-600 font-bold">ـَاتٌ</Ar>.</P>
    
    <RuleBox>
      <strong>Правило для слов, оканчивающихся на «ة»:</strong><br/>
      Эта ة удаляется, а вместо нее добавляется окончание ــَاتٌ.
    </RuleBox>
    <Exa items={[['سَيَّارَةٌ ← سَيَّارَاتٌ','машины'],['طَالِبَةٌ ← طَالِبَاتٌ','студентки'],['سَجَّادَةٌ ← سَجَّادَاتٌ','ковры']]} />
    
    <P className="font-bold mt-2">Что делать, если в слове нет «ة»?</P>
    <P>Например, женское имя زَيْنَبُ. Хвала Аллаху, здесь еще проще: мы просто добавляем ـَاتٌ:</P>
    <Exa items={[['زَيْنَبُ ← زَيْنَبَاتٌ','Зайнабы (больше 2-х девочек/женщин с таким именем)']]} />
    <NoteBox>Словарная подсказка: в арабских словарях правильное множественное число женского рода часто обозначается просто буквами <strong>ات</strong>.</NoteBox>

    <H3>٣. <T id="jam_taksir" big /></H3>
    <P>Плохие новости об этом виде: 1. Большинство слов образуют мн.ч. именно так. 2. У него нет одной определенной формулы. Слова нужно просто заучивать наизусть!</P>
    
    <P className="font-bold">Почему оно называется «ломаным» (تَكْسِير)?</P>
    <P>Потому что при изменении «ломается» структура букв корня. Буквы могут исчезать, добавляться новые, меняться огласовки.</P>
    <Exa items={[['كِتَابٌ ← كُتُبٌ','книги (алиф ا пропала)'],['طَالِبٌ ← طُلَّابٌ','студенты'],['غُرْفَةٌ ← غُرَفٌ','комнаты'],['نَجْمٌ ← نُجُومٌ','звёзды']]} />
  </div>
);

const LText8=()=>(
  <div>
    <LH n="8" ar="النَّكِرَةُ وَالْمَعْرِفَةُ" sub="Определённость и неопределённость" />
    <NoteBox>
      Представьте, что вы работаете в магазине канцтоваров в арабской стране. Заходит покупатель и говорит: <Ar className="font-bold">أُرِيدُ قَلَمًا</Ar> («Я хочу ручку»). Заходит другой покупатель и говорит: <Ar className="font-bold">أُرِيدُ الْقَلَمَ</Ar>. Если вы не поняли, какие именно ручки они хотели, этот урок для вас!
    </NoteBox>
    
    <H3>١. <T id="nakira" big /> — неопределенное</H3>
    <DefBox ru="Указывает на что-то неопределенное или общее. Неизвестно какая ручка (любая вообще)." />
    <Exa items={[['قَلَمٌ','какая-то ручка'],['كِتَابٌ','какая-то книга']]} />

    <H3>٢. <T id="marifa" big /> — определенное</H3>
    <DefBox ru="Указывает на нечто определенное, конкретное и известное." />
    
    <H4>6 видов Имени, которые относятся к الْمَعْرِفَةُ:</H4>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><strong>Все местоимения</strong> (<Ar>الضَّمَائِرُ</Ar>): <Ar>أَنَا، أَنْتَ، هُوَ، هِيَ</Ar></NumItem>
      <NumItem n="٢"><strong>Все указательные местоимения</strong> (<Ar>أَسْمَاءُ الْإِشَارَةِ</Ar>): <Ar>هَذَا، هَذِهِ</Ar></NumItem>
      <NumItem n="٣"><strong>Относительные местоимения</strong> (<Ar>الْأَسْمَاءُ الْمَوْصُولَةُ</Ar>): <Ar>الَّذِي، الَّتِي</Ar></NumItem>
      <NumItem n="٤"><strong>Имя собственное</strong> (<Ar>الْعَلَمُ</Ar>):
        <ul className="list-disc pl-5 mt-1 text-xs text-gray-600">
          <li>Имена: <Ar>مُحَمَّدٌ، زَيْنَبُ</Ar></li>
          <li>Местности: <Ar>مَكَّةُ، مِصْرُ، بَغْدَادُ</Ar></li>
          <li>Прозвища (<Ar>اللَّقَب</Ar>): <Ar>الْفَارُوقُ، ذُو النُّورَيْنِ، سَيْفُ اللَّهِ</Ar></li>
          <li>Кунья (<Ar>أَبُو / أُمّ</Ar>): <Ar>أَبُو بَكْرٍ، أُمُّ فَاطِمَةَ</Ar></li>
        </ul>
      </NumItem>
      <NumItem n="٥"><strong>Слова с артиклем ال</strong>: <Ar>كِتَابٌ ← الْكِتَابُ</Ar>.<br/><span className="text-red-600">Важно:</span> При добавлении ال нужно обязательно убрать танвин. ال и танвин никогда не пишутся вместе!</NumItem>

/* ══════════ APP ══════════ */
const App=()=>{
  const [active,setActive]=useState(1);
  const [scale,setScale]=useState(1);
  const leftRef=useRef(null);
  const secRefs=useRef({});
  const ticking=useRef(false);
  const containerRef=useRef(null);
  const isDragging=useRef(false);
  const dragState=useRef({startClientX:0,startRatio:0.5,startCw:0});
  const divRatioRef=useRef(0.5);
  const scaleRef=useRef(1);
  /* Per-panel horizontal pan — refs for content wrappers and their current offsets */
  const leftContentRef=useRef(null);
  const rightContentRef=useRef(null);
  const offsetLRef=useRef(0);
  const offsetRRef=useRef(0);
  const panState=useRef({side:null,startX:0,startOffset:0});

  const applyDivX=useCallback((c,divXViewport,cwViewport)=>{
    const ratio=Math.max(0,Math.min(1,divXViewport/cwViewport));
    divRatioRef.current=ratio;
    const s=scaleRef.current||1;
    c.style.setProperty('--div-x',(ratio*cwViewport/s)+'px');
    c.style.setProperty('--div-ratio',String(ratio));
  },[]);

  const initLayout=useCallback((preserveRatio=false)=>{
    const c=containerRef.current;
    if(!c)return;
    const cw=c.getBoundingClientRect().width;
    if(!cw)return;
    const ratio=preserveRatio?Math.max(0,Math.min(1,divRatioRef.current)):0.5;
    applyDivX(c,ratio*cw,cw);
  },[applyDivX]);

  useEffect(()=>{
    initLayout(false);
    const ro=new ResizeObserver(()=>initLayout(true));
    if(containerRef.current)ro.observe(containerRef.current);
    return()=>ro.disconnect();
  },[initLayout]);

  const snapTo=useCallback((ratio)=>{
    const c=containerRef.current;
    if(!c)return;
    const cw=c.getBoundingClientRect().width;
    c.classList.add('container-snapping');
    applyDivX(c,Math.max(0,Math.min(1,ratio))*cw,cw);
    const layerRight=c.querySelector('.layer-right');
    const cleanup=()=>c.classList.remove('container-snapping');
    (layerRight||c).addEventListener('transitionend',cleanup,{once:true});
  },[applyDivX]);

  const onDividerDown=useCallback((e)=>{
    const c=containerRef.current;
    if(!c)return;
    const rect=c.getBoundingClientRect();
    isDragging.current=true;
    dragState.current={startClientX:e.clientX,startRatio:divRatioRef.current,startCw:rect.width};
    e.currentTarget.setPointerCapture(e.pointerId);
    e.currentTarget.classList.add('resizing');
    document.body.style.userSelect='none';
    e.preventDefault();
  },[]);

  /* Starts a per-panel content pan when the user drags inside a panel (not the divider) */
  const onPanelDown=useCallback((e)=>{
    if(e.target.closest('.col-divider'))return;
    if(isDragging.current)return;
    const c=containerRef.current;
    if(!c)return;
    const rect=c.getBoundingClientRect();
    const s=scaleRef.current||1;
    const divXPx=parseFloat(c.style.getPropertyValue('--div-x')||'0')*s||rect.width*divRatioRef.current;
    const side=(e.clientX-rect.left)<divXPx?'left':'right';
    panState.current={side,startX:e.clientX,startOffset:side==='left'?offsetLRef.current:offsetRRef.current};
  },[]);

  useEffect(()=>{
    const onMove=(e)=>{
      if(isDragging.current){
        const c=containerRef.current;
        if(!c)return;
        const{startClientX,startRatio,startCw}=dragState.current;
        const cw=c.getBoundingClientRect().width;
        const newRatio=Math.max(0,Math.min(1,startRatio+(e.clientX-startClientX)/startCw));
        applyDivX(c,newRatio*cw,cw);
        return;
      }
      /* Per-panel content pan */
      const ps=panState.current;
      if(!ps.side)return;
      const offset=ps.startOffset+(e.clientX-ps.startX);
      if(ps.side==='left'){
        offsetLRef.current=offset;
        if(leftContentRef.current)leftContentRef.current.style.transform=`translateX(${offset}px)`;
      }else{
        offsetRRef.current=offset;
        if(rightContentRef.current)rightContentRef.current.style.transform=`translateX(${offset}px)`;
      }
    };

    const onUp=()=>{
      if(isDragging.current){
        isDragging.current=false;
        document.body.style.userSelect='';
        document.querySelectorAll('.col-divider').forEach(d=>d.classList.remove('resizing'));
        const c=containerRef.current;
        if(!c)return;
        let t=divRatioRef.current;
        if(t<0.05)t=0;
        else if(t>0.95)t=1;
        else if(Math.abs(t-0.5)<0.05)t=0.5;
        if(t!==divRatioRef.current)snapTo(t);
        return;
      }
      panState.current={side:null,startX:0,startOffset:0};
    };

    window.addEventListener('pointermove',onMove,{passive:true});
    window.addEventListener('pointerup',onUp);
    window.addEventListener('pointercancel',onUp);
    return()=>{
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
      window.removeEventListener('pointercancel',onUp);
    };
  },[applyDivX,snapTo]);

  const zoomIn=useCallback(()=>setScale(p=>Math.min(parseFloat((p+.1).toFixed(1)),1.5)),[]);
  const zoomOut=useCallback(()=>setScale(p=>Math.max(parseFloat((p-.1).toFixed(1)),0.4)),[]);
  const resetZoom=useCallback(()=>setScale(1),[]);

  useEffect(()=>{
    scaleRef.current=scale;
    document.documentElement.style.setProperty('--app-scale',String(scale));
    const raf=requestAnimationFrame(()=>initLayout(true));
    return()=>cancelAnimationFrame(raf);
  },[scale,initLayout]);

  useEffect(()=>{
    const el=leftRef.current;
    if(!el)return;
    const onScroll=()=>{
      if(ticking.current)return;
      ticking.current=true;
      requestAnimationFrame(()=>{
        const rect=el.getBoundingClientRect();
        const trigger=rect.top+rect.height*0.25;
        let cur=1;
        for(const[id,sec] of Object.entries(secRefs.current)){
          if(sec){const r=sec.getBoundingClientRect();if(r.top<=trigger)cur=parseInt(id);}
        }
        setActive(p=>p!==cur?cur:p);
        ticking.current=false;
      });
    };
    el.addEventListener('scroll',onScroll,{passive:true});
    return()=>el.removeEventListener('scroll',onScroll);
  },[]);

  const goTo=useCallback((id)=>{
    const sec=secRefs.current[id];
    const container=leftRef.current;
    if(sec&&container){
      const s=scaleRef.current||1;
      const delta=(sec.getBoundingClientRect().top-container.getBoundingClientRect().top)/s-8;
      container.scrollBy({top:delta,behavior:'smooth'});
    }
  },[]);

  const ActiveInfo=LESSONS[active-1].Info;

  return(
    <>
      <ZoomPanel scale={scale} zoomIn={zoomIn} zoomOut={zoomOut} resetZoom={resetZoom} />
      <div id="app-shell" className="flex flex-col bg-[#d6d3cd]">
        <header className="flex-shrink-0 h-10 bg-emerald-800 flex items-center px-3 gap-3 shadow-md z-30">
          <span className="text-emerald-200 text-[11px] font-medium truncate">Арабская Грамматика — Уроки 1–13</span>
          <div className="ml-auto flex items-center gap-2.5 shrink-0">
            <span className="text-emerald-300 text-[10px]" aria-live="polite">{active}/13</span>
            <div className="w-20 h-1.5 bg-emerald-700 rounded-full overflow-hidden"
                 role="progressbar" aria-valuenow={active} aria-valuemin={1} aria-valuemax={13}>
              <div className="h-full bg-emerald-300 rounded-full transition-[width] duration-300"
                   style={{width:`${(active/13)*100}%`}}></div>
            </div>
          </div>
        </header>
        <nav className="nav-strip flex-shrink-0 flex overflow-x-auto gap-1 px-3 py-2 bg-stone-100 border-b border-stone-300/60 z-20"
             role="tablist" aria-label="Уроки 1–13">
          {LESSONS.map(l=>(
            <button key={l.id} onClick={()=>goTo(l.id)}
              role="tab" aria-selected={active===l.id}
              aria-label={`Урок ${l.id}`}
              className={`nav-pill flex-shrink-0 min-w-[1.8rem] h-7 text-[11px] font-bold px-2 rounded-full border touch-manipulation
                ${active===l.id?'nav-active border-emerald-600':'bg-white text-stone-500 border-stone-200 hover:border-emerald-300 hover:text-emerald-700'}`}>
              {l.id}
            </button>
          ))}
        </nav>
        <div ref={containerRef} className="relative flex-1 min-h-0 overflow-hidden"
             onPointerDown={onPanelDown}>
          <div className="antagonist-layer layer-left">
            <div ref={leftRef} className="l-scroll flex-1 min-h-0 overflow-y-auto px-3 py-3"
                 style={{overflowX:'hidden',touchAction:'pan-y'}}>
              <div ref={leftContentRef} style={{willChange:'transform'}}>
                {LESSONS.map((l,i)=>(
                  <div key={l.id}>
                    <section ref={el=>secRefs.current[l.id]=el} data-lesson={l.id}><l.Text /></section>
                    {i<LESSONS.length-1&&<hr className="lesson-hr" aria-hidden="true" />}
                  </div>
                ))}
                <div style={{height:48}} aria-hidden="true"></div>
              </div>
            </div>
          </div>
          <div className="antagonist-layer layer-right">
            <div ref={rightContentRef} style={{height:'100%',display:'flex',flexDirection:'column',willChange:'transform'}}>
              <div key={active} className="r-scroll panel-enter flex-1 min-h-0 overflow-y-auto"
                   style={{touchAction:'pan-y'}} role="tabpanel">
                <ActiveInfo />
              </div>
            </div>
          </div>
          <div className="col-divider" onPointerDown={onDividerDown}
               title="Перетащите для смещения панелей" aria-hidden="true">
            <div className="col-divider-line"></div>
            <div className="col-divider-handle"></div>
          </div>
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
