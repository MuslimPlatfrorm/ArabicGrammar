<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арабская Грамматика</title>
    
    <!-- Подключение Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключение React и ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Подключение Babel для компиляции JSX прямо в браузере -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Иконки SVG (замена библиотеки lucide-react)
        const IconGrip = ({ size }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/>
            </svg>
        );
        const IconMinus = ({ size }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );
        const IconPlus = ({ size }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );
        const IconRotate = ({ size }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path>
            </svg>
        );

        const ArabicGrammarChart = () => {
            const [scale, setScale] = useState(1);

            const zoomIn = () => setScale(prev => Math.min(prev + 0.1, 1.5));
            const zoomOut = () => setScale(prev => Math.max(prev - 0.1, 0.5));
            const resetZoom = () => setScale(1);

            // Состояния и функции для перетаскивания панели
            const [snapStyle, setSnapStyle] = useState({ right: 12, top: 12 });
            const [isDragging, setIsDragging] = useState(false);
            const dragRef = useRef(null);
            const dragStart = useRef({ x: 0, y: 0, elemX: 0, elemY: 0 });
            const snapTimeout = useRef(null);

            const handlePointerDown = (e) => {
                if (snapTimeout.current) clearTimeout(snapTimeout.current);
                setIsDragging(true);
                const rect = dragRef.current.getBoundingClientRect();
                dragStart.current = {
                x: e.clientX,
                y: e.clientY,
                elemX: rect.left,
                elemY: rect.top
                };
                e.currentTarget.setPointerCapture(e.pointerId);
                setSnapStyle({ left: rect.left, top: rect.top });
            };

            const handlePointerMove = (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragStart.current.x;
                const dy = e.clientY - dragStart.current.y;
                setSnapStyle({
                left: dragStart.current.elemX + dx,
                top: dragStart.current.elemY + dy
                });
            };

            const handlePointerUp = (e) => {
                if (!isDragging) return;
                setIsDragging(false);
                e.currentTarget.releasePointerCapture(e.pointerId);

                const rect = dragRef.current.getBoundingClientRect();
                const screenWidth = window.innerWidth;
                const isLeft = rect.left + rect.width / 2 < screenWidth / 2;
                const targetLeft = isLeft ? 12 : screenWidth - rect.width - 12;

                setSnapStyle({ left: targetLeft, top: rect.top });

                snapTimeout.current = setTimeout(() => {
                if (dragRef.current) {
                    setSnapStyle({
                    ...(isLeft ? { left: 12 } : { right: 12 }),
                    top: rect.top
                    });
                }
                }, 300);
            };

            return (
                <div className="relative min-h-screen bg-emerald-50 font-sans selection:bg-emerald-200 overflow-hidden flex flex-col">
                
                {/* === ПАНЕЛЬ МАСШТАБА === */}
                <div
                    ref={dragRef}
                    style={{
                    position: 'fixed',
                    ...snapStyle,
                    transition: isDragging ? 'none' : 'left 0.3s ease, right 0.3s ease, top 0.3s ease',
                    zIndex: 50
                    }}
                    className="bg-white/90 backdrop-blur shadow-md rounded-lg border border-emerald-100 p-1 flex items-center gap-0.5 opacity-85 hover:opacity-100"
                >
                    <div
                    className="cursor-grab active:cursor-grabbing p-1 text-emerald-400 hover:text-emerald-600 touch-none flex items-center"
                    onPointerDown={handlePointerDown}
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerCancel={handlePointerUp}
                    title="Перетащить панель"
                    >
                    <IconGrip size={16} />
                    </div>
                    <button onClick={zoomOut} className="p-1 hover:bg-emerald-100 rounded text-emerald-700 transition-colors" title="Уменьшить">
                    <IconMinus size={14} />
                    </button>
                    <span className="flex items-center justify-center min-w-[2.5rem] font-bold text-emerald-800 text-[10px]">
                    {Math.round(scale * 100)}%
                    </span>
                    <button onClick={zoomIn} className="p-1 hover:bg-emerald-100 rounded text-emerald-700 transition-colors" title="Увеличить">
                    <IconPlus size={14} />
                    </button>
                    <div className="w-px bg-emerald-200 mx-0.5 h-4"></div>
                    <button onClick={resetZoom} className="p-1 hover:bg-emerald-100 rounded text-emerald-700 transition-colors" title="Сбросить">
                    <IconRotate size={14} />
                    </button>
                </div>

                {/* === ОБЛАСТЬ ПРОКРУТКИ === */}
                <div className="flex-1 overflow-auto p-2 md:p-4">
                    <div 
                    style={{ transform: `scale(${scale})`, transformOrigin: 'top center', width: 'fit-content', margin: '0 auto' }}
                    className="transition-transform duration-200 ease-out"
                    >
                    <div className="max-w-5xl mx-auto bg-white/90 backdrop-blur-sm rounded-xl p-4 sm:p-6 shadow-xl border border-emerald-100 min-w-[900px]">
                        
                        {/* === ЗАГОЛОВОК И ДЕРЕВО НАУК === */}
                        <div className="flex flex-col items-center relative z-10">
                        <div className="inline-block bg-emerald-100/50 px-8 py-3 rounded-2xl border border-emerald-200 shadow-sm z-10">
                            <h1 className="text-3xl font-bold text-emerald-900 uppercase tracking-wide">
                            Арабская Грамматика
                            </h1>
                        </div>

                        <div className="w-0.5 h-6 bg-emerald-400"></div>
                        <div className="w-[352px] h-4 border-t-2 border-x-2 border-emerald-400 rounded-t-lg"></div>

                        {/* НАУКИ: Нахьву и Сарф */}
                        <div className="flex justify-center gap-16 relative">
                            <div className="flex flex-col items-center w-72 relative z-10">
                            <div className="bg-white border border-emerald-300 rounded-xl p-5 shadow-sm w-full hover:-translate-y-1 transition-transform duration-300">
                                <div className="text-4xl font-serif text-emerald-800 mb-3 text-center" dir="rtl">النَّحْوُ</div>
                                <div className="text-sm text-gray-700 leading-snug text-center border-t border-emerald-100 pt-3">
                                Наука, изучающая <br/>
                                <span className="text-emerald-700 font-bold bg-emerald-50 px-1 rounded">окончание слов</span>
                                </div>
                            </div>
                            </div>

                            <div className="flex flex-col items-center w-72 relative z-10">
                            <div className="bg-white border border-emerald-300 rounded-xl p-5 shadow-sm w-full hover:-translate-y-1 transition-transform duration-300">
                                <div className="text-4xl font-serif text-emerald-800 mb-3 text-center" dir="rtl">الصَّرْفُ</div>
                                <div className="text-sm text-gray-700 leading-snug text-center border-t border-emerald-100 pt-3">
                                Наука, изучающая <br/>
                                <span className="text-emerald-700 font-bold bg-emerald-50 px-1 rounded">основу слов</span>
                                </div>
                            </div>
                            </div>
                        </div>

                        {/* === ФИГУРНАЯ СКОБКА === */}
                        <div className="flex justify-center mt-1 w-full relative z-0">
                            <svg width="356" height="40" viewBox="0 0 356 40" className="overflow-visible">
                            <path d="M 2,0 Q 2,20 22,20 L 158,20 Q 178,20 178,40 Q 178,20 198,20 L 334,20 Q 354,20 354,0" fill="none" stroke="#34d399" strokeWidth="2" />
                            </svg>
                        </div>

                        <div className="flex flex-col items-center mt-1">
                            <span className="text-2xl font-bold font-serif text-emerald-900" dir="rtl">أَقْسَامُ الْكَلِمَةِ</span>
                            <span className="text-base font-normal text-emerald-700 mt-1">Виды слов</span>
                        </div>

                        <div className="w-0.5 h-8 bg-emerald-400 mt-2"></div>
                        </div>

                        {/* === КОРНЕВОЙ БЛОК: СЛОВО === */}
                        <div className="flex justify-center relative z-10">
                        <div className="w-64 bg-emerald-600 text-white rounded-xl p-4 text-center shadow-md ring-2 ring-emerald-200">
                            <div className="text-3xl font-bold font-serif mb-1" dir="rtl">الْكَلِمَةُ</div>
                            <div className="text-lg font-semibold uppercase">Слово</div>
                            <p className="text-xs text-emerald-100 mt-2 italic border-t border-emerald-500 pt-1">
                            Высказывание, указывающее на единичное значение
                            </p>
                        </div>
                        </div>

                        {/* === ВЕТКИ: ИМЯ, ГЛАГОЛ, ЧАСТИЦА === */}
                        <div className="relative pt-6">
                        <div className="absolute top-0 left-1/2 w-0.5 h-6 bg-emerald-400 -ml-[1px]"></div>
                        
                        <div className="absolute top-6 left-[16.666%] right-[16.666%] h-0.5 bg-emerald-400 z-0"></div>
                        <div className="absolute top-6 left-[16.666%] w-0.5 h-6 bg-emerald-400 z-0"></div>
                        <div className="absolute top-6 left-1/2 w-0.5 h-6 bg-emerald-400 -ml-[1px] z-0"></div>
                        <div className="absolute top-6 right-[16.666%] w-0.5 h-6 bg-emerald-400 z-0"></div>

                        <div className="grid grid-cols-3 gap-6 relative z-10 pt-12">
                            
                            {/* 1. ИМЯ */}
                            <div className="flex flex-col items-center">
                            <div className="w-full bg-blue-50 border-t-2 border-blue-500 rounded-lg p-4 shadow-sm h-full hover:shadow-md transition-shadow">
                                <div className="text-center mb-3">
                                <span className="text-3xl text-blue-800 font-serif font-bold block" dir="rtl">الِاسْمُ</span>
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1 block">Имя</span>
                                </div>
                                <div className="text-sm text-gray-700 mb-4 bg-white p-3 rounded border border-blue-100 leading-snug">
                                <strong className="font-serif text-blue-900 text-base" dir="rtl">الِاسْمُ</strong> — имеет <strong>самостоятельный смысл</strong>, который <strong>не связан</strong> со временем.
                                </div>
                                <div className="space-y-2 mb-4">
                                <div className="flex justify-between items-center bg-blue-100/50 p-2 rounded">
                                    <span className="font-serif text-lg" dir="rtl">مُحَمَّدٌ</span>
                                    <span className="text-xs text-gray-500">Мухаммад</span>
                                </div>
                                <div className="flex justify-between items-center bg-blue-100/50 p-2 rounded">
                                    <span className="font-serif text-lg" dir="rtl">بَيْتٌ</span>
                                    <span className="text-xs text-gray-500">Дом</span>
                                </div>
                                </div>
                                <div className="mt-auto pt-3 border-t border-blue-200">
                                <div className="text-xs font-bold text-blue-700 uppercase mb-1">Признаки:</div>
                                <ul className="text-xs text-gray-600 list-disc list-inside">
                                    <li>Принимает артикль (ال)</li>
                                    <li>Принимает танвин (ــًــٍــٌ)</li>
                                    <li>Не бывает сукуна ( ْ ) в конце</li>
                                </ul>
                                </div>
                            </div>
                            </div>

                            {/* 2. ГЛАГОЛ */}
                            <div className="flex flex-col items-center">
                            <div className="w-full bg-amber-50 border-t-2 border-amber-500 rounded-lg p-4 shadow-sm h-full hover:shadow-md transition-shadow">
                                <div className="text-center mb-3">
                                <span className="text-3xl text-amber-800 font-serif font-bold block" dir="rtl">الْفِعْلُ</span>
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1 block">Глагол</span>
                                </div>
                                <div className="text-sm text-gray-700 mb-4 bg-white p-3 rounded border border-amber-100 leading-snug">
                                <strong className="font-serif text-amber-900 text-base" dir="rtl">الْفِعْلُ</strong> — имеет <strong>самостоятельный смысл</strong>, который <strong>обязательно связан</strong> со временем.
                                </div>
                                
                                <div className="space-y-3 mt-4">
                                <div className="bg-amber-100/50 p-2 rounded border-l-2 border-amber-300">
                                    <div className="flex justify-between font-bold text-xs text-amber-900 mb-1">
                                    <span>ПРОШЕДШЕЕ</span>
                                    <span className="font-serif" dir="rtl">الْمَاضِي</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                    <span className="font-serif text-lg" dir="rtl">ذَهَبَ</span>
                                    <span className="text-xs text-gray-500">ушел</span>
                                    </div>
                                </div>

                                <div className="bg-amber-100/50 p-2 rounded border-l-2 border-amber-300">
                                    <div className="flex justify-between font-bold text-xs text-amber-900 mb-1">
                                    <span>НАСТ./БУД.</span>
                                    <span className="font-serif" dir="rtl">الْمُضَارِعُ</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                    <span className="font-serif text-lg" dir="rtl">يَذْهَبُ</span>
                                    <span className="text-xs text-gray-500">идет</span>
                                    </div>
                                </div>

                                <div className="bg-amber-100/50 p-2 rounded border-l-2 border-amber-300">
                                    <div className="flex justify-between font-bold text-xs text-amber-900 mb-1">
                                    <span>ПРИКАЗ</span>
                                    <span className="font-serif" dir="rtl">الْأَمْرُ</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                    <span className="font-serif text-lg" dir="rtl">اِذْهَبْ</span>
                                    <span className="text-xs text-gray-500">иди</span>
                                    </div>
                                </div>
                                </div>

                                <div className="mt-4 pt-3 border-t border-amber-200">
                                <div className="text-xs font-bold text-amber-700 uppercase mb-1">Признаки:</div>
                                <ul className="text-xs text-gray-600 list-disc list-inside">
                                    <li>Не принимает кясру (ــِ) в конце</li>
                                </ul>
                                </div>
                            </div>
                            </div>

                            {/* 3. ЧАСТИЦА */}
                            <div className="flex flex-col items-center">
                            <div className="w-full bg-slate-50 border-t-2 border-slate-500 rounded-lg p-4 shadow-sm h-full hover:shadow-md transition-shadow">
                                <div className="text-center mb-3">
                                <span className="text-3xl text-slate-800 font-serif font-bold block" dir="rtl">الْحَرْفُ</span>
                                <span className="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1 block">Частица</span>
                                </div>
                                <div className="text-sm text-gray-700 mb-4 bg-white p-3 rounded border border-slate-200 leading-snug">
                                <strong className="font-serif text-slate-900 text-base" dir="rtl">الْحَرْفُ</strong> — <strong>не имеет полного смысла</strong>; смысл появляется только в связке с <span className="font-serif text-emerald-800 font-bold" dir="rtl">الِاسْمُ</span> или <span className="font-serif text-emerald-800 font-bold" dir="rtl">الْفِعْلُ</span> и <strong>не связан</strong> со временем.
                                </div>
                                <div className="grid grid-cols-3 gap-2 mb-4">
                                <div className="bg-slate-200 p-2 rounded text-center">
                                    <div className="font-serif font-bold" dir="rtl">فِي</div>
                                    <div className="text-[10px] text-gray-500">в</div>
                                </div>
                                <div className="bg-slate-200 p-2 rounded text-center">
                                    <div className="font-serif font-bold" dir="rtl">مِنْ</div>
                                    <div className="text-[10px] text-gray-500">из</div>
                                </div>
                                <div className="bg-slate-200 p-2 rounded text-center">
                                    <div className="font-serif font-bold" dir="rtl">عَلَى</div>
                                    <div className="text-[10px] text-gray-500">на</div>
                                </div>
                                </div>
                                <div className="bg-yellow-50 p-2 rounded border border-yellow-200 text-xs text-gray-700 mt-auto">
                                <strong>Пример:</strong> <span className="font-serif" dir="rtl">مُحَمَّدٌ فِي الْبَيْتِ</span>
                                <br/>
                                (Мухаммад в доме) — смысл проявился.
                                </div>
                            </div>
                            </div>

                        </div>
                        </div>

                        {/* === СЛИЯНИЕ ВНИЗ === */}
                        <div className="relative h-10 w-full z-0 mt-4">
                        <div className="absolute top-0 left-[16.666%] w-0.5 h-6 bg-emerald-400"></div>
                        <div className="absolute top-0 left-1/2 w-0.5 h-6 bg-emerald-400 -ml-[1px]"></div>
                        <div className="absolute top-0 right-[16.666%] w-0.5 h-6 bg-emerald-400"></div>
                        <div className="absolute top-6 left-[16.666%] right-[16.666%] h-0.5 bg-emerald-400 z-0"></div>
                        <div className="absolute top-6 left-1/2 w-0.5 h-8 bg-emerald-400 -ml-[1px]"></div>
                        </div>

                        {/* === ЧАСТЬ 2 === */}
                        <div className="mt-2 pt-0 pb-4">
                        <div className="flex flex-col items-center relative z-10 mb-8">
                            <div className="inline-block bg-emerald-100/50 px-8 py-3 rounded-2xl border border-emerald-200 shadow-sm z-10 text-center">
                            <h2 className="text-3xl font-bold font-serif text-emerald-800" dir="rtl">الْإِعْرَابُ وَالْبِنَاءُ</h2>
                            <p className="text-sm font-normal uppercase text-emerald-600 mt-1 tracking-widest">(СОСТОЯНИЕ СЛОВА)</p>
                            </div>

                            <div className="relative w-full h-8 z-0">
                            <div className="absolute top-0 left-1/2 w-0.5 h-4 bg-emerald-400 -ml-[1px]"></div>
                            <div className="absolute top-4 left-[calc(25%-8px)] right-[calc(25%-8px)] h-0.5 bg-emerald-400"></div>
                            <div className="absolute top-4 left-[calc(25%-8px)] w-0.5 h-4 bg-emerald-400"></div>
                            <div className="absolute top-4 right-[calc(25%-8px)] w-0.5 h-4 bg-emerald-400"></div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-6 items-start">
                            
                            {/* ЛЕВАЯ КОЛОНКА */}
                            <div className="relative">
                            <div className="bg-green-100/70 p-4 rounded-xl border border-green-300 shadow-sm flex flex-col">
                                <div className="flex items-center gap-3 mb-3 border-b border-green-300 pb-3">
                                <div className="bg-green-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-base font-bold">1</div>
                                <div>
                                    <h3 className="text-xl font-bold text-green-900" dir="rtl">الْمُعْرَبُ</h3>
                                    <p className="text-green-700 font-semibold uppercase text-xs">ИЗМЕНЯЕМОЕ</p>
                                </div>
                                </div>
                                
                                <p className="text-sm text-green-800 mb-3 leading-relaxed">
                                Окончание слова меняется под воздействием различных факторов (падежей).
                                </p>

                                <div className="bg-white rounded-lg p-3 shadow-sm space-y-2.5">
                                <div className="flex justify-between items-center border-b border-gray-100 pb-2">
                                    <span className="text-xs text-gray-500 w-24 leading-tight">Это дом<br/>(Сказуемое)</span>
                                    <div className="text-right flex flex-col items-end">
                                    <span className="font-serif text-lg text-green-700" dir="rtl">هَذَا بَيْتٌ</span>
                                    <span className="flex items-center gap-1.5 text-[10px] text-red-500 font-bold uppercase mt-0.5">
                                        Окончание: <span className="font-serif text-2xl font-black text-red-600 leading-none" dir="rtl">ـٌ</span>
                                    </span>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center border-b border-gray-100 pb-2">
                                    <span className="text-xs text-gray-500 w-24 leading-tight">Вижу дом<br/>(Объект)</span>
                                    <div className="text-right flex flex-col items-end">
                                    <span className="font-serif text-lg text-green-700" dir="rtl">رَأَيْتُ بَيْتًا</span>
                                    <span className="flex items-center gap-1.5 text-[10px] text-red-500 font-bold uppercase mt-0.5">
                                        Окончание: <span className="font-serif text-2xl font-black text-red-600 leading-none" dir="rtl">ـً</span>
                                    </span>
                                    </div>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-xs text-gray-500 w-24 leading-tight">У дома<br/>(Род. п.)</span>
                                    <div className="text-right flex flex-col items-end">
                                    <span className="font-serif text-lg text-green-700" dir="rtl">مَرَرْتُ بِبَيْتٍ</span>
                                    <span className="flex items-center gap-1.5 text-[10px] text-red-500 font-bold uppercase mt-0.5">
                                        Окончание: <span className="font-serif text-2xl font-black text-red-600 leading-none" dir="rtl">ـٍ</span>
                                    </span>
                                    </div>
                                </div>
                                </div>
                            </div>
                            </div>

                            {/* ПРАВАЯ КОЛОНКА */}
                            <div className="relative">
                            <div className="bg-red-50/80 p-4 rounded-xl border border-red-300 shadow-sm flex flex-col">
                                <div className="flex items-center gap-3 mb-3 border-b border-red-200 pb-3">
                                <div className="bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center text-base font-bold">2</div>
                                <div>
                                    <h3 className="text-xl font-bold text-red-900" dir="rtl">الْمَبْنِيُّ</h3>
                                    <p className="text-red-700 font-semibold uppercase text-xs">НЕИЗМЕНЯЕМОЕ</p>
                                </div>
                                </div>

                                <p className="text-sm text-red-800 mb-3 leading-relaxed">
                                Окончание слова <strong>не меняется</strong>, несмотря на его положение в предложении.
                                </p>

                                <div className="bg-white rounded-lg p-2.5 shadow-sm mb-4 border-l-4 border-red-400">
                                <div className="text-[11px] text-gray-500 mb-1">Пример (слово هَؤُلَاءِ - эти):</div>
                                <div className="flex gap-2 text-sm justify-center">
                                    <span className="bg-red-100 px-2 py-0.5 rounded font-serif" dir="rtl">جَاءَ هَؤُلَاءِ</span>
                                    <span className="bg-red-100 px-2 py-0.5 rounded font-serif" dir="rtl">رَأَيْتُ هَؤُلَاءِ</span>
                                    <span className="bg-red-100 px-2 py-0.5 rounded font-serif" dir="rtl">بِهَؤُلَاءِ</span>
                                </div>
                                <div className="flex items-center justify-end gap-1.5 text-[10px] text-red-500 font-bold uppercase mt-1">
                                    Всегда кясра <span className="font-serif text-2xl font-black text-red-600 leading-none" dir="rtl">ـِ</span>
                                </div>
                                </div>

                                <h4 className="font-bold text-red-900 mb-1.5 uppercase text-[11px] flex items-center gap-1.5">
                                Какие слова <span className="font-serif text-lg normal-case font-bold mt-[-2px]" dir="rtl">مَبْنِي</span>؟
                                </h4>
                                <ul className="list-disc list-inside text-xs text-gray-700 space-y-1 mb-4">
                                <li><span className="font-bold">Все частицы</span> (الْحَرْفُ)</li>
                                <li><span className="font-bold">Глаголы:</span> Прошедшее (الْمَاضِي) и Приказ (الْأَمْرُ)</li>
                                <li><span className="font-bold">Глагол наст. вр. (الْمُضَارِعُ):</span> Только в 2 случаях</li>
                                </ul>

                                <div className="mt-1 pt-3 border-t border-red-200">
                                <h3 className="text-center text-[10px] font-bold text-red-800 mb-2 uppercase tracking-wider bg-red-100/50 py-1 rounded">
                                    6 основных видов неизменяемых имен
                                </h3>
                                
                                <div className="grid grid-cols-2 gap-1.5">
                                    {[
                                    { title: 'Местоимения', arab: 'الضَّمَائِرُ', ex: 'أَنْتَ (ты), كِتَابُكَ' },
                                    { title: 'Указательные', arab: 'أَسْمَاءُ الْإِشَارَةِ', ex: 'هَذَا (этот), هَذِهِ' },
                                    { title: 'Относительные', arab: 'الْأَسْمَاءُ الْمَوْصُولَةُ', ex: 'الَّذِي (который)' },
                                    { title: 'Имена условия', arab: 'أَسْمَاءُ الشَّرْطِ', ex: 'مَنْ (кто бы ни)' },
                                    { title: 'Вопросительные', arab: 'أَسْمَاءُ الْاِسْتِفْهَامِ', ex: 'مَتَى (когда?)' },
                                    { title: 'Обстоятельства', arab: 'بَعْضُ الظُّرُوفِ', ex: 'أَمْسِ (вчера)' },
                                    ].map((item, idx) => (
                                    <div key={idx} className="bg-white border border-red-100 rounded p-1.5 hover:border-red-300 transition-colors shadow-sm">
                                        <div className="flex justify-between items-center mb-0.5 gap-1">
                                        <span className="font-bold text-red-900 text-[9px]">{idx + 1}. {item.title}</span>
                                        <span className="font-serif text-[10px] bg-red-50 px-1 rounded text-red-700" dir="rtl">{item.arab}</span>
                                        </div>
                                        <div className="text-[9px] text-gray-500 bg-gray-50 p-1 rounded leading-tight">
                                        {item.ex}
                                        </div>
                                    </div>
                                    ))}
                                </div>
                                </div>

                            </div>
                            </div>

                        </div>
                        </div>

                    </div>
                    </div>
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ArabicGrammarChart />);
    </script>
</body>
</html>
