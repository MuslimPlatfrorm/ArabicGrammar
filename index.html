<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Арабская Грамматика — عبد الأحد</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Spectral:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{body:['Spectral','Georgia','serif'],ar:['Amiri','serif']}}}}</script>
  <style>
    html,body,#root{height:100%;overflow:hidden;}
    #app-shell{
      transform-origin:top left;
      transform:scale(var(--app-scale,1));
      width:calc(100% / var(--app-scale,1));
      height:calc(100dvh / var(--app-scale,1));
      overflow:hidden;
    }
    *,*::before,*::after{box-sizing:border-box;}
    body{font-family:'Spectral',Georgia,serif;-webkit-text-size-adjust:100%;overscroll-behavior:none;margin:0;padding:0;touch-action:manipulation;}
    [lang="ar"],.font-ar{font-family:'Amiri',serif;line-height:2.1;}

    .l-scroll{scrollbar-width:thin;scrollbar-color:rgba(52,211,153,.45) transparent;}
    .l-scroll::-webkit-scrollbar{width:4px;}
    .l-scroll::-webkit-scrollbar-thumb{background:rgba(52,211,153,.45);border-radius:99px;}
    .r-scroll{scrollbar-width:thin;scrollbar-color:rgba(100,116,139,.25) transparent;}
    .r-scroll::-webkit-scrollbar{width:4px;}
    .r-scroll::-webkit-scrollbar-thumb{background:rgba(100,116,139,.25);border-radius:99px;}
    .nav-strip{scrollbar-width:none;}
    .nav-strip::-webkit-scrollbar{display:none;}

    @keyframes panelIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .panel-enter{animation:panelIn .2s ease-out forwards;will-change:opacity,transform;}

    .lesson-hr{border:none;height:2px;background:linear-gradient(to right,transparent,#6ee7b7 30%,#6ee7b7 70%,transparent);margin:2rem 0;}
    .nav-active{background:#059669;color:#fff;box-shadow:0 1px 6px rgba(5,150,105,.35);}
    .nav-pill{transition:background .15s,color .15s;}
    .r-header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.97);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}

    /* ── ANTAGONIST MASKING ARCHITECTURE ──────────────────────────────────── */
    .antagonist-layer{
      position:absolute;top:0;left:0;bottom:0;right:0;
      width:100%;height:100%;
      display:flex;flex-direction:column;
      /* pan-y: browser handles vertical scroll natively;
         horizontal movement is NOT consumed by the browser, so our JS
         swipe gesture can intercept it without blocking vertical scroll */
      touch-action:pan-y;
    }
    .layer-left{z-index:1;background:#fdf8f0;}
    .layer-right{
      z-index:2;background:#ffffff;
      clip-path:inset(0 0 0 var(--div-x,50%));
      /* OPT-1: clip-path on compositor thread; will-change promotes layer up-front */
      will-change:clip-path;
    }

    /* Snapping transitions */
    .container-snapping .layer-right{
      transition:clip-path .3s cubic-bezier(.4,0,.2,1);
    }
    /* OPT-2: animate transform instead of left — transform is GPU-composited;
       left triggers layout + paint on every frame */
    .container-snapping .col-divider{
      transition:transform .3s cubic-bezier(.4,0,.2,1);
    }

    /* OPT-3: divider uses transform for movement instead of left, keeping left:0.
       This puts position updates entirely on the compositor thread. */
    .col-divider{
      position:absolute;top:0;bottom:0;
      left:0;
      width:36px;
      /* translateX = --div-x (the desired centre point) minus half the handle width */
      transform:translateX(calc(var(--div-x,50%) - 50%));
      will-change:transform;
      z-index:20;
      cursor:col-resize;
      display:flex;align-items:center;justify-content:center;
      user-select:none;touch-action:none;
    }
    .col-divider-line{
      position:absolute;
      width:4px;height:100%;
      background:linear-gradient(to bottom,#6ee7b7,#10b981 50%,#6ee7b7);
      transition:width .15s,background .15s;
      pointer-events:none;
    }
    .col-divider:hover .col-divider-line,
    .col-divider.resizing .col-divider-line{
      width:8px;
      background:linear-gradient(to bottom,#34d399,#059669 50%,#34d399);
    }
    .col-divider-handle{
      position:absolute;
      top:50%;left:50%;
      transform:translate(calc(-50% + (0.5 - var(--div-ratio,0.5)) * 36px),-50%);
      width:36px;height:36px;
      background:#ffffff;
      border:3px solid #10b981;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(0,0,0,.25);
      transition:border-color .15s,background-color .15s;
      z-index:2;
    }
    .col-divider:hover .col-divider-handle,
    .col-divider.resizing .col-divider-handle{
      border-color:#059669;
      background:#f0fdf4;
    }
    /* OPT-4: shared pseudo-element styles already combined (no change needed);
       added explicit display:block so width/height are unambiguous */
    .col-divider-handle::before,
    .col-divider-handle::after{
      content:'';display:block;
      width:2px;height:14px;
      background:#10b981;
      margin:0 2px;border-radius:2px;
    }
    .col-divider:hover .col-divider-handle::before,
    .col-divider:hover .col-divider-handle::after,
    .col-divider.resizing .col-divider-handle::before,
    .col-divider.resizing .col-divider-handle::after{
      background:#059669;
    }

    .r-scroll{overflow-x:hidden;overflow-y:auto;}
    .r-scroll > *{min-width:0;}
    .r-scroll p,.r-scroll div,.r-scroll li,.r-scroll td{overflow-wrap:break-word;}
    .r-scroll [lang="ar"]{word-break:normal;overflow-wrap:normal;}

    .zoom-panel-base{
      position:fixed;z-index:9999;
      background:rgba(255,255,255,.96);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      border:1px solid #a7f3d0;border-radius:14px;
      padding:3px 5px;display:flex;align-items:center;gap:1px;
      box-shadow:0 4px 18px rgba(5,150,105,.18);
      touch-action:none;cursor:grab;opacity:.88;
      transition:opacity .15s,box-shadow .15s,left .3s,right .3s,top .3s;
    }
    .zoom-panel-base:hover{opacity:1;box-shadow:0 6px 24px rgba(5,150,105,.28);}
    .zoom-panel-base.dragging{cursor:grabbing;opacity:1;box-shadow:0 8px 28px rgba(5,150,105,.38);transition:none;}
    .zp-btn{
      width:32px;height:32px;border-radius:9px;border:none;background:none;
      display:flex;align-items:center;justify-content:center;
      color:#065f46;cursor:pointer;touch-action:manipulation;
      transition:background .12s;flex-shrink:0;
    }
    .zp-btn:hover{background:#d1fae5;}
    .zp-btn:active{background:#a7f3d0;}
    .zp-sep{width:1px;height:16px;background:#a7f3d0;margin:0 2px;flex-shrink:0;}
    .zp-pct{font-size:11px;font-weight:700;color:#065f46;min-width:38px;text-align:center;user-select:none;cursor:grab;}

    .ag2{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem;}
    .ag3{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:.45rem;}
    .ag4{display:grid;grid-template-columns:repeat(auto-fit,minmax(65px,1fr));gap:.4rem;}

    /* OPT-5: fixed typo — was `.col-divider-bar` (no longer exists); correct class is `.col-divider-line` */
    @media(prefers-reduced-motion:reduce){
      .panel-enter{animation:none;}
      .nav-pill,.col-divider-line,.split-track{transition:none;}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback,memo}=React;

/* ══════════ TERMS ══════════ */
const TERMS={
  nahw:{ar:'النَّحْوُ',ru:'Нахьву',c:'emerald'},
  sarf:{ar:'الصَّرْفُ',ru:'Сарф',c:'teal'},
  kalima:{ar:'الْكَلِمَةُ',ru:'Калима',c:'emerald'},
  ism:{ar:'الِاسْمُ',ru:'Исм',c:'sky'},
  fiil:{ar:'الْفِعْلُ',ru:'Фи\'л',c:'amber'},
  madi:{ar:'الْمَاضِي',ru:'Мады',c:'orange'},
  mudari:{ar:'الْمُضَارِعُ',ru:'Мудори',c:'blue'},
  amr:{ar:'الْأَمْرُ',ru:'Амр',c:'red'},
  harf:{ar:'الْحَرْفُ',ru:'Харф',c:'slate'},
  mabni:{ar:'الْمَبْنِيُّ',ru:'Мабни',c:'rose'},
  murab:{ar:'الْمُعْرَبُ',ru:'Му\'роб',c:'green'},
  hal:{ar:'حَالَةٌ',ru:'Халя',c:'emerald'},
  rafaa:{ar:'الرَّفْعُ',ru:'Рафа\'',c:'green'},
  nasb:{ar:'النَّصْبُ',ru:'Насб',c:'amber'},
  jarr:{ar:'الْجَرُّ',ru:'Джарр',c:'orange'},
  jazm:{ar:'الْجَزْمُ',ru:'Джазм',c:'red'},
  muzakkar:{ar:'الْمُذَكَّرُ',ru:'Музаккар',c:'blue'},
  muannas:{ar:'الْمُؤَنَّثُ',ru:'Муаннас',c:'pink'},
  mufrad:{ar:'الْمُفْرَدُ',ru:'Муфрад',c:'indigo'},
  musanna:{ar:'الْمُثَنَّى',ru:'Мусанни',c:'indigo'},
  jamaa:{ar:'الْجَمْعُ',ru:'Джам\'а',c:'indigo'},
  mubtada:{ar:'الْمُبْتَدَأُ',ru:'Мубтада',c:'teal'},
  khabar:{ar:'الْخَبَرُ',ru:'Хабар',c:'cyan'},
  jam_muzakkar:{ar:'جَمْعُ الْمُذَكَّرِ السَّالِمِ',ru:'Дж.Муз.Сани',c:'blue'},
  jam_muannas:{ar:'جَمْعُ الْمُؤَنَّثِ السَّالِمِ',ru:'Дж.Муан.Сани',c:'pink'},
  jam_taksir:{ar:'جَمْعُ التَّكْسِيرِ',ru:'Дж.Таксиир',c:'orange'},
  nakira:{ar:'النَّكِرَةُ',ru:'Накира',c:'gray'},
  marifa:{ar:'الْمَعْرِفَةُ',ru:'Ма\'рифа',c:'yellow'},
  damir:{ar:'الضَّمَائِرُ',ru:'Домаир',c:'purple'},
  munfasil:{ar:'الْمُنْفَصِلَةُ',ru:'Мунфасил',c:'purple'},
  muttasil:{ar:'الْمُتَّصِلَةُ',ru:'Муттасил',c:'fuchsia'},
  mutakallim:{ar:'الْمُتَكَلِّمُ',ru:'Мутакаллим',c:'blue'},
  mukhatab:{ar:'الْمُخَاطَبُ',ru:'Мухатаб',c:'amber'},
  ghaib:{ar:'الْغَائِبُ',ru:'Гойб',c:'rose'},
};

/* ══════════ BASE COMPONENTS ══════════ */
const Ar=({children,className=''})=><span dir="rtl" lang="ar" className={`font-ar leading-[2.1] ${className}`}>{children}</span>;

/* OPT-6: color lookup maps moved to MODULE LEVEL (outside T component).
   Previously these three objects (54 total properties) were re-created inside
   T on every single render. Every badge call re-allocated all three objects
   even though the values never change. Hoisting them makes them singletons. */
const T_BG={emerald:'bg-emerald-100',teal:'bg-teal-100',sky:'bg-sky-100',blue:'bg-blue-100',amber:'bg-amber-100',orange:'bg-orange-100',red:'bg-red-100',slate:'bg-slate-100',green:'bg-green-100',rose:'bg-rose-100',pink:'bg-pink-100',purple:'bg-purple-100',fuchsia:'bg-fuchsia-100',indigo:'bg-indigo-100',violet:'bg-violet-100',cyan:'bg-cyan-100',gray:'bg-gray-100',yellow:'bg-yellow-100'};
const T_BD={emerald:'border-emerald-300',teal:'border-teal-300',sky:'border-sky-300',blue:'border-blue-300',amber:'border-amber-300',orange:'border-orange-300',red:'border-red-300',slate:'border-slate-300',green:'border-green-300',rose:'border-rose-300',pink:'border-pink-300',purple:'border-purple-300',fuchsia:'border-fuchsia-300',indigo:'border-indigo-300',violet:'border-violet-300',cyan:'border-cyan-300',gray:'border-gray-300',yellow:'border-yellow-300'};
const T_TX={emerald:'text-emerald-800',teal:'text-teal-800',sky:'text-sky-800',blue:'text-blue-800',amber:'text-amber-800',orange:'text-orange-800',red:'text-red-800',slate:'text-slate-700',green:'text-green-800',rose:'text-rose-800',pink:'text-pink-800',purple:'text-purple-800',fuchsia:'text-fuchsia-800',indigo:'text-indigo-800',violet:'text-violet-800',cyan:'text-cyan-800',gray:'text-gray-700',yellow:'text-yellow-800'};

const T=({id,big=false})=>{
  const t=TERMS[id];if(!t)return null;
  return<span title={t.ru} aria-label={t.ru}
    className={`term-badge inline-flex items-center gap-1 rounded-md border font-bold align-middle ${big?'px-3 py-1.5 text-xs':'px-2 py-1 text-[10px]'} ${T_BG[t.c]} ${T_BD[t.c]} ${T_TX[t.c]}`}
  ><Ar className="leading-tight">{t.ar}</Ar></span>;
};

/* OPT-7: Tbl wrapped in memo. It is called from inside already-memoized Info
   components, so it was never in a hot re-render path. memo here is belt-and-
   suspenders — if outer memoization ever changes this prevents cascading renders. */
const Tbl=memo(({headers,rows,rCls})=>(
  <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm w-full">
    <table className="w-full text-center text-sm" style={{minWidth:'320px'}} role="table">
      <thead className="bg-gray-100 text-gray-700 font-bold text-[10px] uppercase">
        <tr>{headers.map((h,i)=><th key={i} scope="col" className="p-2 border-b-2 border-r last:border-r-0 border-gray-200">{h}</th>)}</tr>
      </thead>
      <tbody className="bg-white">
        {rows.map((r,i)=><tr key={i} className={`border-b border-gray-50 ${rCls?rCls(r):''}`}>
          {r.cells.map((cell,j)=><td key={j} className="p-2 border-r last:border-r-0 border-gray-100">{cell}</td>)}
        </tr>)}
      </tbody>
    </table>
  </div>
));

/* ══════════ ARROW CONNECTOR COMPONENTS ══════════ */
const CLink=({c='emerald',h=8})=><div className={`w-0.5 bg-${c}-400 mx-auto z-0`} style={{height:`${h*4}px`}}></div>;

const V2down=({c='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-1/2 w-0.5 h-4 bg-${c}-400 -ml-px`}></div>
    <div className={`absolute top-4 left-[calc(25%-6px)] right-[calc(25%-6px)] h-0.5 bg-${c}-400`}></div>
    <div className={`absolute top-4 left-[calc(25%-6px)] w-0.5 h-4 bg-${c}-400`}></div>
    <div className={`absolute top-4 right-[calc(25%-6px)] w-0.5 h-4 bg-${c}-400`}></div>
  </div>
);
const V2up=({tc='emerald',bc='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-[calc(25%-6px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-0 right-[calc(25%-6px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-[calc(25%-6px)] right-[calc(25%-6px)] h-0.5 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-1/2 w-0.5 h-4 bg-${bc}-400 -ml-px`}></div>
  </div>
);
const V3down=({c='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-1/2 w-0.5 h-4 bg-${c}-400 -ml-px`}></div>
    <div className={`absolute top-4 left-[calc(16.666%-8px)] right-[calc(16.666%-8px)] h-0.5 bg-${c}-400`}></div>
    <div className={`absolute top-4 left-[calc(16.666%-8px)] w-0.5 h-4 bg-${c}-400`}></div>
    <div className={`absolute top-4 left-1/2 w-0.5 h-4 bg-${c}-400 -ml-px`}></div>
    <div className={`absolute top-4 right-[calc(16.666%-8px)] w-0.5 h-4 bg-${c}-400`}></div>
  </div>
);
const V3up=({tc='emerald',bc='emerald'})=>(
  <div className="relative w-full z-0" style={{height:32}}>
    <div className={`absolute top-0 left-[calc(16.666%-8px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-0 left-1/2 w-0.5 h-4 bg-${tc}-400 -ml-px`}></div>
    <div className={`absolute top-0 right-[calc(16.666%-8px)] w-0.5 h-4 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-[calc(16.666%-8px)] right-[calc(16.666%-8px)] h-0.5 bg-${tc}-400`}></div>
    <div className={`absolute top-4 left-1/2 w-0.5 h-4 bg-${bc}-400 -ml-px`}></div>
  </div>
);

const BHead=({ar,ru,bg='emerald',lesson})=>(
  <div className={`inline-block bg-${bg}-50 px-4 py-2 rounded-xl border border-${bg}-200 shadow-sm z-10 text-center w-full`}>
    {lesson&&<div className={`text-[9px] font-bold bg-${bg}-100 text-${bg}-700 border border-${bg}-200 rounded-full px-2 py-0.5 inline-block mb-1`}>Урок {lesson}</div>}
    <h2 className={`text-lg font-bold font-ar text-${bg}-800`}><Ar>{ar}</Ar></h2>
    <p className={`text-[9px] font-normal uppercase text-${bg}-600 tracking-widest`}>({ru})</p>
  </div>
);
const LBadge=({n})=>(
  <span className="inline-block px-2 py-0.5 rounded-full text-[9px] font-bold bg-emerald-100 text-emerald-700 border border-emerald-200 mb-1">
    Урок {n}
  </span>
);
const IBox=({children,color='emerald'})=>(
  <div className={`bg-${color}-50 border border-${color}-200 rounded-lg p-2 text-[11px] text-${color}-900 leading-relaxed`}>{children}</div>
);
const RBox=({children})=>(
  <div className="bg-amber-50 border border-amber-300 rounded-lg p-2 text-[11px] text-amber-900 font-bold text-center leading-relaxed">{children}</div>
);
const Ex=({ar,ru})=>(
  <div className="flex items-baseline gap-2 py-0.5 flex-wrap">
    <Ar className="text-sm font-bold text-gray-800">{ar}</Ar>
    {ru&&<span className="text-[11px] text-gray-500">— {ru}</span>}
  </div>
);

/* ══════════ DATA ══════════ */
const PAST=[
  {pr:'أَنَا',ru:'Я',verb:'ذَهَبْتُ',rule:'+تُ',more:'قَرَأْتُ',p:1},
  {pr:'نَحْنُ',ru:'Мы',verb:'ذَهَبْنَا',rule:'+نَا',more:'قَرَأْنَا',p:1},
  {pr:'أَنْتَ',ru:'Ты (м)',verb:'ذَهَبْتَ',rule:'+تَ',more:'قَرَأْتَ',p:2},
  {pr:'أَنْتِ',ru:'Ты (ж)',verb:'ذَهَبْتِ',rule:'+تِ',more:'قَرَأْتِ',p:2},
  {pr:'أَنْتُمَا',ru:'Вы двое',verb:'ذَهَبْتُمَا',rule:'+تُمَا',more:'قَرَأْتُمَا',p:2},
  {pr:'أَنْتُمْ',ru:'Вы (м)',verb:'ذَهَبْتُمْ',rule:'+تُمْ',more:'قَرَأْتُمْ',p:2,muz:true},
  {pr:'أَنْتُنَّ',ru:'Вы (ж)',verb:'ذَهَبْتُنَّ',rule:'+تُنَّ',more:'قَرَأْتُنَّ',p:2,muan:true},
  {pr:'هُوَ',ru:'Он',verb:'ذَهَبَ',rule:'основа',more:'قَرَأَ — أَكَلَ',p:3,muz:true},
  {pr:'هِيَ',ru:'Она',verb:'ذَهَبَتْ',rule:'+تْ',more:'قَرَأَتْ',p:3,muan:true},
  {pr:'هُمَا',ru:'Они 2',verb:'ذَهَبَا',rule:'+ا',more:'سَكَنَا',p:3},
  {pr:'هُمْ',ru:'Они (м)',verb:'ذَهَبُوا',rule:'+وا',more:'قَرَأُوا',p:3,muz:true},
  {pr:'هُنَّ',ru:'Они (ж)',verb:'ذَهَبْنَ',rule:'+نَ',more:'قَرَأْنَ',p:3,muan:true},
];
const PRESENT=[
  {pr:'أَنَا',ru:'Я',verb:'أَذْهَبُ',rule:'أَ+',more:'أَقْرَأُ — آكُلُ',p:1},
  {pr:'نَحْنُ',ru:'Мы',verb:'نَذْهَبُ',rule:'نَ+',more:'نَقْرَأُ',p:1},
  {pr:'أَنْتَ',ru:'Ты (м)',verb:'تَذْهَبُ',rule:'تَ+',more:'تَقْرَأُ',p:2,muz:true},
  {pr:'أَنْتِ',ru:'Ты (ж)',verb:'تَذْهَبِينَ',rule:'تَ++ينَ',more:'',p:2,muan:true},

/* ══════════ ZOOM PANEL ══════════ */
const ZoomPanel=({scale,zoomIn,zoomOut,resetZoom})=>{
  const [pos,setPos]=useState({top:16,right:16,left:'auto'});
  const [drag,setDrag]=useState(false);
  const ref=useRef(null);
  const info=useRef({});
  const moved=useRef(false);

  const onDown=e=>{
    if(e.target.closest('button'))return;
    /* OPT-8: preventDefault stops accidental scroll-start on touch devices
       when the user intends to drag the zoom panel */
    e.preventDefault();
    e.stopPropagation();setDrag(true);moved.current=false;
    const r=ref.current.getBoundingClientRect();
    info.current={sx:e.clientX,sy:e.clientY,rl:r.left,rt:r.top};
    setPos({top:r.top,left:r.left,right:'auto'});
  };

  useEffect(()=>{
    const onMove=e=>{
      if(!drag)return;
      const dx=e.clientX-info.current.sx,dy=e.clientY-info.current.sy;
      if(Math.abs(dx)>3||Math.abs(dy)>3)moved.current=true;
      setPos({top:info.current.rt+dy,left:info.current.rl+dx,right:'auto'});
    };
    const onUp=()=>{
      if(!drag)return;setDrag(false);
      moved.current=false;  /* BUG FIX: reset after drag so buttons work on next click */
      if(ref.current){
        const r=ref.current.getBoundingClientRect();
        const il=r.left+r.width/2<window.innerWidth/2;
        setPos({top:r.top,...(il?{left:16,right:'auto'}:{right:16,left:'auto'})});
      }
    };
    if(drag){
      window.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp);
      window.addEventListener('pointercancel',onUp);
      document.body.style.userSelect='none';
    }
    return()=>{
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
      window.removeEventListener('pointercancel',onUp);
      document.body.style.userSelect='';
    };
  },[drag]);

  const kh=fn=>e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();if(!moved.current)fn();}};
  const bc="zp-btn";
  return(
    <div ref={ref} onPointerDown={onDown}
      className={`zoom-panel-base${drag?' dragging':''}`}
      style={{top:pos.top,left:pos.left,right:pos.right}}
      role="toolbar" aria-label="Масштаб">
      <button className={bc} onClick={e=>{e.stopPropagation();if(!moved.current)zoomOut();}} onKeyDown={kh(zoomOut)} aria-label="Уменьшить" title="-">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <span className="zp-pct" aria-live="polite">{Math.round(scale*100)}%</span>
      <button className={bc} onClick={e=>{e.stopPropagation();if(!moved.current)zoomIn();}} onKeyDown={kh(zoomIn)} aria-label="Увеличить" title="+">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <div className="zp-sep"></div>
      <button className={bc} onClick={e=>{e.stopPropagation();if(!moved.current)resetZoom();}} onKeyDown={kh(resetZoom)} aria-label="Сбросить" title="100%">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  );
};

const LText1=()=>(
  <div>
    <LH n="1" ar="الْكَلِمَةُ — أَقْسَامُ الْكَلَامِ" sub="Виды слов" />
    <P>Арабская грамматика состоит из двух основных разделов:</P>
    <div className="my-2 space-y-1.5">
      <NumItem n="١"><T id="nahw" /> — изучает <strong>окончания</strong> слов.</NumItem>

    <H3><T id="kalima" big /> — Слово</H3>
    <DefBox ar="الْكَلِمَةُ هِيَ اللَّفْظُ الدَّالُّ عَلَى مَعْنًى مُفْرَدٍ" ru="Слово — высказывание, указывающее на единичное значение." />
    <Exa items={[['مُحَمَّدٌ','Мухаммад'],['مَسْجِدٌ','мечеть'],['ذَهَبَ','ушёл'],['مِنْ','из']]} />

    <Exa items={[['مُحَمَّدٌ','Мухаммад'],['بَيْتٌ','Дом'],['كِتَابٌ','Книга']]} />
    <RuleBox>Признаки: принимает <Ar>ال</Ar> и танвин (<Ar>ـٌ ـً ـٍ</Ar>); в конце <strong>никогда</strong> нет <Ar className="text-red-600 font-bold">ـْ</Ar>.</RuleBox>
    <H3>٢. Глагол <T id="fiil" big /></H3>

    <div className="my-2 space-y-1.5">

const LText2=()=>(
  <div>

const LText5=()=>(

    <Exa items={[['أَنَا','Я (м и ж)'],['نَحْنُ','Мы (м и ж)']]} />
    <H3>٢. <T id="mukhatab" big /> — 2 лицо</H3>
    <Exa items={[['أَنْتَ','Ты (м)'],['أَنْتِ','Ты (ж)'],['أَنْتُمَا','Вы двое'],['أَنْتُمْ','Вы (м, 3+)'],['أَنْتُنَّ','Вы (ж, 3+)']]} />
    <H3>٣. <T id="ghaib" big /> — 3 лицо</H3>
    <Exa items={[['هُوَ','Он'],['هِيَ','Она'],['هُمَا','Они двое'],['هُمْ','Они (м, 3+)'],['هُنَّ','Они (ж, 3+)']]} />
  </div>
);
const LText10=()=>(
  <div>
    <LH n="10" ar="الضَّمَائِرُ الْمُتَّصِلَةُ" sub="Слитные местоимения" />
    <P>Присоединяются к концу <T id="ism" />, <T id="fiil" /> и <T id="harf" />.</P>
    <Exa items={[['كِتَابِي','моя книга'],['ضَرَبَنِي','он ударил меня'],['فِيهِ','в нём']]} />
    <H3>По лицам:</H3>
    <H4><T id="mutakallim" big /></H4>
    <Exa items={[['كِتَابِي','(ي)'],['فِيَّ / إِلَيَّ','во мне / ко мне']]} />
    <H4><T id="mukhatab" big /></H4>
    <Exa items={[['كِتَابُكَ','(أنتَ)'],['كِتَابُكِ','(أنتِ)'],['كِتَابُكُمْ','(أنتم)']]} />
    <H4><T id="ghaib" big /></H4>
    <Exa items={[['كِتَابُهُ / فِيهِ','(هو)'],['كِتَابُهَا / فِيهَا','(هي)'],['كِتَابُهُمْ','(هم)']]} />
  </div>
);
const LText11=()=>(
  <div>
    <LH n="11" ar="أَقْسَامُ الْجُمْلَةِ" sub="Виды предложений" />
    <H3>١. <Ar className="font-bold text-teal-800">الْجُمْلَةُ الِاسْمِيَّةُ</Ar></H3>
    <DefBox ar="هِيَ الَّتِي تَبْدَأُ بِالِاسْمِ" ru="Начинается с имени. Два члена: мубтада + хабар." />
    <RuleBox>Оба всегда в <T id="rafaa" />. <T id="mubtada" /> всегда <T id="marifa" />.</RuleBox>
    <DefBox ar="الْمُعَلِّمَانِ مَاهِرَانِ" ru="Два учителя умелы. (Оба в рафа')" />
    <H3>٢. <Ar className="font-bold text-cyan-800">الْجُمْلَةُ الْفِعْلِيَّةُ</Ar></H3>
    <DefBox ar="هِيَ الَّتِي تَبْدَأُ بِالْفِعْلِ" ru="Начинается с глагола." />
    <Exa items={[['ذَهَبَ مُحَمَّدٌ','Ушёл Мухаммад'],['يَقْرَأُ الطَّالِبُ','Студент читает'],['جَاءَ هَؤُلَاءِ','Пришли эти']]} />
  </div>
);
const LText12=()=>(
  <div>
    <LH n="12" ar="فِعْلُ الْمَاضِي" sub="Прошедшее время" />
    <P>Словарная форма — هُوَ мады: <Ar className="font-bold">قَرَأَ — يَقْرَأُ — اِقْرَأْ</Ar> (читать).</P>
    <RuleBox>При добавлении суффиксов на последнюю букву ставится сукун <Ar>ـْ</Ar>.</RuleBox>
    <H3><T id="mutakallim" big /></H3>
    <Exa items={[['ذَهَبْتُ','Я ушёл (+تُ)'],['ذَهَبْنَا','Мы ушли (+نَا)']]} />
    <H3><T id="mukhatab" big /></H3>
    <Exa items={[['ذَهَبْتَ','Ты ушёл (+تَ)'],['ذَهَبْتِ','Ты ушла (+تِ)'],['ذَهَبْتُمْ','Вы м (+تُمْ)'],['ذَهَبْتُنَّ','Вы ж (+تُنَّ)']]} />
    <H3><T id="ghaib" big /></H3>
    <Exa items={[['ذَهَبَ','Он (основа)'],['ذَهَبَتْ','Она (+تْ)'],['ذَهَبَا','Они 2 (+ا)'],['ذَهَبُوا','Они м (+وا)'],['ذَهَبْنَ','Они ж (+نَ)']]} />
  </div>
);
const LText13=()=>(
  <div>
    <LH n="13" ar="فِعْلُ الْمُضَارِعِ وَالْأَمْرِ" sub="Настоящее/будущее и повелительное" />
    <H3><T id="mudari" big /></H3>
    <H4><T id="mutakallim" big /></H4>
    <Exa items={[['أَذْهَبُ','Я иду (أَ+)'],['نَذْهَبُ','Мы идём (نَ+)']]} />
    <H4><T id="mukhatab" big /></H4>
    <Exa items={[['تَذْهَبُ','Ты м (تَ+)'],['تَذْهَبِينَ','Ты ж (+ينَ)'],['تَذْهَبُونَ','Вы м (+ونَ)'],['تَذْهَبْنَ','Вы ж (+نَ)']]} />
    <H4><T id="ghaib" big /></H4>
    <Exa items={[['يَذْهَبُ','Он (يَ+)'],['تَذْهَبُ','Она (تَ+)'],['يَذْهَبُونَ','Они м (+ونَ)'],['يَذْهَبْنَ','Они ж (+نَ)']]} />
    <H3><T id="amr" big /> — только <T id="mukhatab" /></H3>
    <Exa items={[['اِذْهَبْ','Иди! м (основа)'],['اِذْهَبِي','Иди! ж (+ي)'],['اِذْهَبُوا','Идите! м (+وا)']]} />
    <NoteBox><T id="amr" /> всегда <T id="mabni" />. Только для 2-го лица.</NoteBox>
  </div>
);

/* ══════════ LESSONS ══════════ */
const LESSONS=[
  {id:1,Text:LText1,Info:Info1},{id:2,Text:LText2,Info:Info2},{id:3,Text:LText3,Info:Info3},
  {id:4,Text:LText4,Info:Info4},{id:5,Text:LText5,Info:Info5},{id:6,Text:LText6,Info:Info6},
  {id:7,Text:LText7,Info:Info7},{id:8,Text:LText8,Info:Info8},{id:9,Text:LText9,Info:Info9},
  {id:10,Text:LText10,Info:Info10},{id:11,Text:LText11,Info:Info11},{id:12,Text:LText12,Info:Info12},
  {id:13,Text:LText13,Info:Info13},
];

/* ══════════ APP ══════════ */
const App=()=>{
  const [active,setActive]=useState(1);
  const [scale,setScale]=useState(1);
  const leftRef=useRef(null);
  const secRefs=useRef({});
  const ticking=useRef(false);
  const containerRef=useRef(null);
  const isDragging=useRef(false);
  /* OPT-9: dragState initial value corrected to match the fields actually used
     by onDividerDown/onMove (startClientX, startRatio, startCw), removing
     the stale {startX, startDivX} names that were left from an older implementation */
  const dragState=useRef({startClientX:0,startRatio:0.5,startCw:0});
  const divRatioRef=useRef(0.5);
  const scaleRef=useRef(1);
  /* Per-panel horizontal pan — each side scrolls independently, divider never moves */
  const leftContentRef=useRef(null);   /* inner wrapper in left panel  */
  const rightContentRef=useRef(null);  /* inner wrapper in right panel */
  const offsetLRef=useRef(0);          /* current translateX of left content  */
  const offsetRRef=useRef(0);          /* current translateX of right content */
  const panState=useRef({side:null,startX:0,startOffset:0});

  const applyDivX=useCallback((c,divXViewport,cwViewport)=>{
    const ratio=Math.max(0,Math.min(1,divXViewport/cwViewport));
    divRatioRef.current=ratio;
    const s=scaleRef.current||1;
    c.style.setProperty('--div-x',(ratio*cwViewport/s)+'px');
    c.style.setProperty('--div-ratio',String(ratio));
  },[]);

  const initLayout=useCallback((preserveRatio=false)=>{
    const c=containerRef.current;
    if(!c)return;
    const cw=c.getBoundingClientRect().width;
    if(!cw)return;
    const ratio=preserveRatio?Math.max(0,Math.min(1,divRatioRef.current)):0.5;
    applyDivX(c,ratio*cw,cw);
  },[applyDivX]);

  useEffect(()=>{
    initLayout(false);
    const ro=new ResizeObserver(()=>initLayout(true));
    if(containerRef.current)ro.observe(containerRef.current);
    return()=>ro.disconnect();
  },[initLayout]);

  const snapTo=useCallback((ratio)=>{
    const c=containerRef.current;
    if(!c)return;
    const cw=c.getBoundingClientRect().width;
    c.classList.add('container-snapping');
    applyDivX(c,Math.max(0,Math.min(1,ratio))*cw,cw);
    /* OPT-10: listen for transitionend on .layer-right (the element actually
       transitioning clip-path) rather than on the container. Using the container
       previously worked via event bubbling but was ambiguous when multiple
       child transitions fired. Targeting the animating element directly is
       unambiguous and removes the class at exactly the right moment. */
    const layerRight=c.querySelector('.layer-right');
    const cleanup=()=>c.classList.remove('container-snapping');
    (layerRight||c).addEventListener('transitionend',cleanup,{once:true});
  },[applyDivX]);

  const onDividerDown=useCallback((e)=>{
    const c=containerRef.current;
    if(!c)return;
    const rect=c.getBoundingClientRect();
    isDragging.current=true;
    dragState.current={startClientX:e.clientX,startRatio:divRatioRef.current,startCw:rect.width};
    e.currentTarget.setPointerCapture(e.pointerId);
    e.currentTarget.classList.add('resizing');
    document.body.style.userSelect='none';
    e.preventDefault();
  },[]);

  /* applyPanOffset — writes translateX to the inner content wrapper of a panel */
  const applyPanOffset=useCallback((side,offset)=>{
    if(side==='left'){
      offsetLRef.current=offset;
      if(leftContentRef.current)leftContentRef.current.style.transform=`translateX(${offset}px)`;
    }else{
      offsetRRef.current=offset;
      if(rightContentRef.current)rightContentRef.current.style.transform=`translateX(${offset}px)`;
    }
  },[]);

  /* onPanelDown — starts a per-panel horizontal pan; divider stays untouched */
  const onPanelDown=useCallback((e)=>{
    if(e.target.closest('.col-divider'))return; /* divider has its own handler */
    if(isDragging.current)return;
    const c=containerRef.current;
    if(!c)return;
    const rect=c.getBoundingClientRect();
    /* Determine which panel was touched */
    const s=scaleRef.current||1;
    const divXViewport=parseFloat(c.style.getPropertyValue('--div-x')||'0')*s||rect.width*divRatioRef.current;
    const side=(e.clientX-rect.left)<divXViewport?'left':'right';
    panState.current={
      side,
      startX:e.clientX,
      startOffset:side==='left'?offsetLRef.current:offsetRRef.current,
    };
  },[]);

  useEffect(()=>{
    const onMove=(e)=>{
      /* ── Divider drag (priority) ── */
      if(isDragging.current){
        const c=containerRef.current;
        if(!c)return;
        const{startClientX,startRatio,startCw}=dragState.current;
        const cw=c.getBoundingClientRect().width;
        const newRatio=Math.max(0,Math.min(1,startRatio+(e.clientX-startClientX)/startCw));
        applyDivX(c,newRatio*cw,cw);
        return;
      }

      /* ── Per-panel content pan ── */
      const ps=panState.current;
      if(!ps.side)return;
      const dx=e.clientX-ps.startX;
      applyPanOffset(ps.side,ps.startOffset+dx);
    };

    const onUp=()=>{
      /* ── Divider drag end ── */
      if(isDragging.current){
        isDragging.current=false;
        document.body.style.userSelect='';
        document.querySelectorAll('.col-divider').forEach(d=>d.classList.remove('resizing'));
        const c=containerRef.current;
        if(!c)return;
        let t=divRatioRef.current;
        if(t<0.05)t=0;
        else if(t>0.95)t=1;
        else if(Math.abs(t-0.5)<0.05)t=0.5;
        if(t!==divRatioRef.current)snapTo(t);
        return;
      }

      /* ── Panel pan end — just stop, no snap needed for content offset ── */
      panState.current={side:null,startX:0,startOffset:0};
    };

    window.addEventListener('pointermove',onMove,{passive:true});
    window.addEventListener('pointerup',onUp);
    window.addEventListener('pointercancel',onUp);
    return()=>{
      window.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
      window.removeEventListener('pointercancel',onUp);
    };
  },[applyDivX,snapTo]);

  const zoomIn=useCallback(()=>setScale(p=>Math.min(parseFloat((p+.1).toFixed(1)),1.5)),[]);
  const zoomOut=useCallback(()=>setScale(p=>Math.max(parseFloat((p-.1).toFixed(1)),0.4)),[]);
  const resetZoom=useCallback(()=>setScale(1),[]);

  useEffect(()=>{
    scaleRef.current=scale;
    document.documentElement.style.setProperty('--app-scale',String(scale));
    const raf=requestAnimationFrame(()=>initLayout(true));
    return()=>cancelAnimationFrame(raf);
  },[scale,initLayout]);

  useEffect(()=>{
    const el=leftRef.current;
    if(!el)return;
    const onScroll=()=>{
      if(ticking.current)return;
      ticking.current=true;
      requestAnimationFrame(()=>{
        const rect=el.getBoundingClientRect();
        const trigger=rect.top+rect.height*0.25;
        let cur=1;
        for(const[id,sec] of Object.entries(secRefs.current)){
          if(sec){const r=sec.getBoundingClientRect();if(r.top<=trigger)cur=parseInt(id);}
        }
        setActive(p=>p!==cur?cur:p);
        ticking.current=false;
      });
    };
    el.addEventListener('scroll',onScroll,{passive:true});
    return()=>el.removeEventListener('scroll',onScroll);
  },[]);

  const goTo=useCallback((id)=>{
    const sec=secRefs.current[id];
    const container=leftRef.current;
    if(sec&&container){
      const s=scaleRef.current||1;
      const delta=(sec.getBoundingClientRect().top-container.getBoundingClientRect().top)/s-8;
      container.scrollBy({top:delta,behavior:'smooth'});
    }
  },[]);

  const ActiveInfo=LESSONS[active-1].Info;

  return(
    <>
      <ZoomPanel scale={scale} zoomIn={zoomIn} zoomOut={zoomOut} resetZoom={resetZoom} />
      <div id="app-shell" className="flex flex-col bg-[#d6d3cd]">
        <header className="flex-shrink-0 h-10 bg-emerald-800 flex items-center px-3 gap-3 shadow-md z-30">
          <Ar className="text-white font-bold text-sm leading-none">عبد الأحد</Ar>
          <div className="w-px h-4 bg-emerald-600" aria-hidden="true"></div>
          <span className="text-emerald-200 text-[11px] font-medium truncate">Арабская Грамматика — Уроки 1–13</span>
          <div className="ml-auto flex items-center gap-2.5 shrink-0">
            <span className="text-emerald-300 text-[10px]" aria-live="polite">{active}/13</span>
            <div className="w-20 h-1.5 bg-emerald-700 rounded-full overflow-hidden"
                 role="progressbar" aria-valuenow={active} aria-valuemin={1} aria-valuemax={13}>
              <div className="h-full bg-emerald-300 rounded-full transition-[width] duration-300"
                   style={{width:`${(active/13)*100}%`}}></div>
            </div>
          </div>
        </header>
        <nav className="nav-strip flex-shrink-0 flex overflow-x-auto gap-1 px-3 py-2 bg-stone-100 border-b border-stone-300/60 z-20"
             role="tablist" aria-label="Уроки 1–13">
          {LESSONS.map(l=>(
            <button key={l.id} onClick={()=>goTo(l.id)}
              role="tab" aria-selected={active===l.id}
              aria-label={`Урок ${l.id}`}
              className={`nav-pill flex-shrink-0 min-w-[1.8rem] h-7 text-[11px] font-bold px-2 rounded-full border touch-manipulation
                ${active===l.id?'nav-active border-emerald-600':'bg-white text-stone-500 border-stone-200 hover:border-emerald-300 hover:text-emerald-700'}`}>
              {l.id}
            </button>
          ))}
        </nav>
        <div ref={containerRef} className="relative flex-1 min-h-0 overflow-hidden"
             onPointerDown={onPanelDown}>
          <div className="antagonist-layer layer-left">
            <div ref={leftRef} className="l-scroll flex-1 min-h-0 overflow-y-auto px-3 py-3"
                 style={{overflowX:'hidden',touchAction:'pan-y'}}>
              {/* leftContentRef wrapper: receives translateX for horizontal panel pan */}
              <div ref={leftContentRef} style={{willChange:'transform'}}>
                {LESSONS.map((l,i)=>(
                  <div key={l.id}>
                    <section ref={el=>secRefs.current[l.id]=el} data-lesson={l.id}><l.Text /></section>
                    {i<LESSONS.length-1&&<hr className="lesson-hr" aria-hidden="true" />}
                  </div>
                ))}
                <div style={{height:48}} aria-hidden="true"></div>
              </div>
            </div>
          </div>
          <div className="antagonist-layer layer-right">
            {/* rightContentRef wrapper: receives translateX for horizontal panel pan */}
            <div ref={rightContentRef} style={{height:'100%',display:'flex',flexDirection:'column',willChange:'transform'}}>
              <div key={active} className="r-scroll panel-enter flex-1 min-h-0 overflow-y-auto"
                   style={{touchAction:'pan-y'}} role="tabpanel">
                <ActiveInfo />
              </div>
            </div>
          </div>
          <div className="col-divider" onPointerDown={onDividerDown}
               title="Перетащите для смещения панелей" aria-hidden="true">
            <div className="col-divider-line"></div>
            <div className="col-divider-handle"></div>
          </div>
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
