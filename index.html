<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Справочник Арабской Грамматики</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Amiri', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    body { -webkit-overflow-scrolling: touch; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: rgba(52, 211, 153, 0.5); border-radius: 10px; }

    /*
      Safari/macOS fix: transform: scale() меняет визуальный размер, но НЕ layout-footprint.
      ScaleWrapper компенсирует это, явно задавая высоту = naturalHeight × scale.
    */
    .scale-wrapper {
      transform-origin: top center;
      will-change: transform;
    }

    /* Изолируем stacking context каждого блока */
    .grammar-block { isolation: isolate; }

    /*
      prefers-reduced-motion: отключает все анимации, если пользователь
      включил эту настройку в системе (iOS, Android, macOS, Windows, Smart TV).
    */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .scale-wrapper { transition: none !important; }
    }
  </style>
</head>
<body class="bg-emerald-50 font-sans text-gray-800 m-0 p-0 overflow-hidden h-[100dvh]">

  <div id="root" class="w-full h-full"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ============================================================
    // СТАТИЧЕСКИЕ ДАННЫЕ — вне компонента, не пересоздаются при ререндере
    // ============================================================
    const VERBS = [
      { face: 'أَنَا (Я)',            madi: 'ذَهَبْتُ',    mudari: 'أَذْهَبُ',    amr: '-' },
      { face: 'نَحْنُ (Мы)',           madi: 'ذَهَبْنَا',   mudari: 'نَذْهَبُ',    amr: '-' },
      { face: 'أَنْتَ (Ты м)',         madi: 'ذَهَبْتَ',    mudari: 'تَذْهَبُ',    amr: 'اِذْهَبْ' },
      { face: 'أَنْتِ (Ты ж)',         madi: 'ذَهَبْتِ',    mudari: 'تَذْهَبِينَ', amr: 'اِذْهَبِي' },
      { face: 'أَنْتُمَا (Вы 2)',      madi: 'ذَهَبْتُمَا', mudari: 'تَذْهَبَانِ', amr: 'اِذْهَبَا' },
      { face: 'أَنْتُمْ (Вы мн. м)',   madi: 'ذَهَبْتُمْ',  mudari: 'تَذْهَبُونَ', amr: 'اِذْهَبُوا' },
      { face: 'أَنْتُنَّ (Вы мн. ж)',  madi: 'ذَهَبْتُنَّ', mudari: 'تَذْهَبْنَ',  amr: '-' },
      { face: 'هُوَ (Он)',             madi: 'ذَهَبَ',      mudari: 'يَذْهَبُ',    amr: '-' },
      { face: 'هِيَ (Она)',            madi: 'ذَهَبَتْ',    mudari: 'تَذْهَبُ',    amr: '-' },
      { face: 'هُمَا (Они 2)',         madi: 'ذَهَبَا',     mudari: 'يَذْهَبَانِ', amr: '-' },
      { face: 'هُمْ (Они мн. м)',      madi: 'ذَهَبُوا',    mudari: 'يَذْهَبُونَ', amr: '-' },
      { face: 'هُنَّ (Они мн. ж)',     madi: 'ذَهَبْنَ',    mudari: 'يَذْهَبْنَ',  amr: '-' },
    ];

    const PRONOUNS = [
      { face: '3 лицо (Он/Она)', items: [
        { m: 'هُوَ',      s: 'ــهُ / ــهِ', ru: 'Он/Его'   },
        { m: 'هِيَ',      s: 'ــهَا',        ru: 'Она/Ее'   },
        { m: 'هُمَا',     s: 'ــهُمَا',      ru: 'Они двое' },
        { m: 'هُمْ',      s: 'ــهُمْ',       ru: 'Они (м)'  },
        { m: 'هُنَّ',     s: 'ــهُنَّ',      ru: 'Они (ж)'  },
      ]},
      { face: '2 лицо (Ты/Вы)', items: [
        { m: 'أَنْتَ',    s: 'ــكَ',         ru: 'Ты (м)'   },
        { m: 'أَنْتِ',    s: 'ــكِ',         ru: 'Ты (ж)'   },
        { m: 'أَنْتُمَا', s: 'ــكُمَا',      ru: 'Вы двое'  },
        { m: 'أَنْتُمْ',  s: 'ــكُمْ',       ru: 'Вы (м)'   },
        { m: 'أَنْتُنَّ', s: 'ــكُنَّ',      ru: 'Вы (ж)'   },
      ]},
      { face: '1 лицо (Я/Мы)', items: [
        { m: 'أَنَا',     s: 'ــي / ــنِي',  ru: 'Я/Мой'    },
        { m: 'نَحْنُ',    s: 'ــنَا',        ru: 'Мы/Наш'   },
      ]},
    ];

    // ============================================================
    // Ar — обёртка для арабского текста.
    // dir="rtl" lang="ar" обеспечивают корректное отображение огласовок,
    // правильное направление вязи и произношение в screen readers
    // (iOS VoiceOver, Android TalkBack, NVDA, JAWS).
    // ============================================================
    const Ar = ({ children, className = '' }) => (
      <span dir="rtl" lang="ar" className={`font-serif ${className}`}>
        {children}
      </span>
    );

    // ============================================================
    // Звено цепи — простой вертикальный соединитель
    // ============================================================
    const ChainLink = () => (
      <div className="w-0.5 h-12 bg-emerald-400 z-0"></div>
    );

    // ============================================================
    // ScaleWrapper — исправление наложения блоков при scale() в Safari/macOS.
    // ResizeObserver отслеживает изменения размеров при загрузке шрифтов.
    // ============================================================
    const ScaleWrapper = ({ scale, children }) => {
      const innerRef = useRef(null);
      const [naturalHeight, setNaturalHeight] = useState(0);

      useEffect(() => {
        if (!innerRef.current) return;
        const measure = () => {
          if (innerRef.current) setNaturalHeight(innerRef.current.scrollHeight);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(innerRef.current);
        return () => ro.disconnect();
      }, []);

      return (
        <div style={{ height: naturalHeight ? naturalHeight * scale : 'auto', width: '100%' }}>
          <div
            ref={innerRef}
            className="scale-wrapper transition-transform duration-200 ease-out"
            style={{ transform: `scale(${scale})`, width: 'fit-content', margin: '0 auto' }}
          >
            {children}
          </div>
        </div>
      );
    };

    // ============================================================
    // ZoomPanel — перетаскиваемая панель масштаба.
    // aria-label + aria-live + onKeyDown (Enter/Space) — полная
    // поддержка клавиатуры и screen readers на всех платформах.
    // ============================================================
    const ZoomPanel = ({ scale, zoomIn, zoomOut, resetZoom }) => {
      const [position, setPosition] = useState({ top: 16, right: 16, left: 'auto' });
      const [isDragging, setIsDragging] = useState(false);
      const dragRef = useRef(null);
      const dragInfo = useRef({ startX: 0, startY: 0, rectLeft: 0, rectTop: 0 });
      const hasMoved = useRef(false);

      const handlePointerDown = (e) => {
        e.stopPropagation();
        setIsDragging(true);
        hasMoved.current = false;
        const rect = dragRef.current.getBoundingClientRect();
        dragInfo.current = { startX: e.clientX, startY: e.clientY, rectLeft: rect.left, rectTop: rect.top };
        setPosition({ top: rect.top, left: rect.left, right: 'auto' });
      };

      useEffect(() => {
        const handlePointerMove = (e) => {
          if (!isDragging) return;
          const dx = e.clientX - dragInfo.current.startX;
          const dy = e.clientY - dragInfo.current.startY;
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved.current = true;
          setPosition({ top: dragInfo.current.rectTop + dy, left: dragInfo.current.rectLeft + dx, right: 'auto' });
        };
        const handlePointerUp = () => {
          if (!isDragging) return;
          setIsDragging(false);
          if (dragRef.current) {
            const rect = dragRef.current.getBoundingClientRect();
            const isLeft = rect.left + rect.width / 2 < window.innerWidth / 2;
            setPosition({ top: rect.top, ...(isLeft ? { left: 16, right: 'auto' } : { right: 16, left: 'auto' }) });
          }
        };
        if (isDragging) {
          window.addEventListener('pointermove', handlePointerMove);
          window.addEventListener('pointerup', handlePointerUp);
          window.addEventListener('pointercancel', handlePointerUp);
          document.body.style.userSelect = 'none';
        }
        return () => {
          window.removeEventListener('pointermove', handlePointerMove);
          window.removeEventListener('pointerup', handlePointerUp);
          window.removeEventListener('pointercancel', handlePointerUp);
          document.body.style.userSelect = '';
        };
      }, [isDragging]);

      const makeKeyHandler = (action) => (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); if (!hasMoved.current) action(); }
      };

      const btnCls = "p-2 hover:bg-emerald-100 rounded-lg text-emerald-700 cursor-pointer touch-manipulation focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-400";

      return (
        <div
          ref={dragRef}
          onPointerDown={handlePointerDown}
          role="toolbar"
          aria-label="Панель масштабирования"
          style={{
            position: 'fixed', top: position.top, left: position.left, right: position.right,
            transition: isDragging ? 'none' : 'left 0.3s ease, right 0.3s ease, top 0.3s ease',
            zIndex: 50,
          }}
          className={`cursor-grab active:cursor-grabbing touch-none bg-white/95 backdrop-blur shadow-md rounded-xl border border-emerald-200 p-1 flex items-center gap-1 transition-all ${isDragging ? 'opacity-100 shadow-xl scale-105' : 'opacity-90 hover:opacity-100'}`}
          title="Удерживайте, чтобы переместить"
        >
          <button
            aria-label="Уменьшить масштаб" tabIndex={0}
            onClick={(e) => { e.stopPropagation(); if (!hasMoved.current) zoomOut(); }}
            onKeyDown={makeKeyHandler(zoomOut)}
            className={btnCls}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>

          <span
            aria-live="polite"
            aria-label={`Масштаб ${Math.round(scale * 100)} процентов`}
            className="flex items-center justify-center min-w-[3.5rem] font-bold text-emerald-800 text-sm select-none"
          >
            {Math.round(scale * 100)}%
          </span>

          <button
            aria-label="Увеличить масштаб" tabIndex={0}
            onClick={(e) => { e.stopPropagation(); if (!hasMoved.current) zoomIn(); }}
            onKeyDown={makeKeyHandler(zoomIn)}
            className={btnCls}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>

          <div className="w-px bg-emerald-200 mx-1 h-6" aria-hidden="true"></div>

          <button
            aria-label="Сбросить масштаб до 100%" tabIndex={0}
            onClick={(e) => { e.stopPropagation(); if (!hasMoved.current) resetZoom(); }}
            onKeyDown={makeKeyHandler(resetZoom)}
            className={btnCls}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
        </div>
      );
    };

    // ============================================================
    // ГЛАВНЫЙ КОМПОНЕНТ
    // ============================================================
    const ArabicGrammarApp = () => {
      const [scale, setScale] = useState(1);
      const zoomIn    = useCallback(() => setScale(p => Math.min(parseFloat((p + 0.1).toFixed(1)), 1.5)), []);
      const zoomOut   = useCallback(() => setScale(p => Math.max(parseFloat((p - 0.1).toFixed(1)), 0.4)), []);
      const resetZoom = useCallback(() => setScale(1), []);

      return (
        <div className="relative h-screen bg-emerald-50 font-sans selection:bg-emerald-200 overflow-hidden flex flex-col">

          <ZoomPanel scale={scale} zoomIn={zoomIn} zoomOut={zoomOut} resetZoom={resetZoom} />

          <div className="flex-1 overflow-auto p-4 md:p-8 w-full relative">
            <ScaleWrapper scale={scale}>

              {/* ══════════════════════════════════════════════
                  ЕДИНЫЙ ХОЛСТ — фиксированная ширина сохраняет
                  каркас дерева. На узких экранах пользователь
                  уменьшает масштаб через ZoomPanel.
              ══════════════════════════════════════════════ */}
              <div className="grammar-block w-full max-w-[900px] mx-auto bg-white rounded-[2.5rem] p-8 md:p-12 shadow-2xl border border-emerald-100 min-w-[800px] flex flex-col items-center gap-0 pb-32">

                {/* ── ЗАГОЛОВОК ── */}
                <div className="inline-block bg-emerald-100/50 px-8 py-2 rounded-xl border border-emerald-200 shadow-sm z-10">
                  <h1 className="text-2xl font-bold text-emerald-900 uppercase tracking-wide">Арабская Грамматика</h1>
                </div>

                <div className="w-0.5 h-6 bg-emerald-400 z-0"></div>

                {/* ── НАХЬВУ / САРФ: разветвление на 2 ── */}
                <div className="w-[280px] h-4 border-t-2 border-x-2 border-emerald-400 rounded-t-md z-0"></div>
                <div className="flex justify-center gap-6 relative w-full">
                  <div className="flex flex-col items-center w-64 z-10">
                    <div className="bg-white border border-emerald-300 rounded-lg p-3 shadow-sm w-full">
                      <Ar className="text-3xl text-emerald-800 mb-1 block text-center">النَّحْوُ</Ar>
                      <div className="text-xs text-gray-700 leading-tight text-center border-t border-emerald-100 pt-2">
                        Наука, изучающая <span className="text-emerald-700 font-bold">окончание слов</span>
                      </div>
                    </div>
                  </div>
                  <div className="flex flex-col items-center w-64 z-10">
                    <div className="bg-white border border-emerald-300 rounded-lg p-3 shadow-sm w-full">
                      <Ar className="text-3xl text-emerald-800 mb-1 block text-center">الصَّرْفُ</Ar>
                      <div className="text-xs text-gray-700 leading-tight text-center border-t border-emerald-100 pt-2">
                        Наука, изучающая <span className="text-emerald-700 font-bold">основу слов</span>
                      </div>
                    </div>
                  </div>
                </div>

                {/* SVG-слияние 2 веток → центр */}
                <div className="flex justify-center w-full relative z-0">
                  <svg width="284" height="24" viewBox="0 0 284 24" className="overflow-visible" aria-hidden="true">
                    <path d="M 2,0 Q 2,12 17,12 L 127,12 Q 142,12 142,24 Q 142,12 157,12 L 267,12 Q 282,12 282,0" fill="none" stroke="#34d399" strokeWidth="2"/>
                  </svg>
                </div>

                <div className="flex flex-col items-center z-10 bg-white/80 px-4 py-1 rounded-full">
                  <Ar className="text-xl font-bold text-emerald-900">أَقْسَامُ الْكَلِمَةِ</Ar>
                  <span className="text-sm font-normal text-emerald-700">Виды слов</span>
                </div>

                <div className="w-0.5 h-6 bg-emerald-400 z-0"></div>

                {/* ── СЛОВО ── */}
                <div className="w-56 bg-emerald-600 text-white rounded-lg p-3 text-center shadow-md ring-4 ring-emerald-100 z-10">
                  <Ar className="text-2xl font-bold text-white mb-1 block">الْكَلِمَةُ</Ar>
                  <div className="text-base font-semibold uppercase">Слово</div>
                </div>

                {/* Разветвление на 3 ветки */}
                <div className="relative w-full h-8 z-0">
                  <div className="absolute top-0 left-1/2 w-0.5 h-4 bg-emerald-400 -ml-[1px]"></div>
                  <div className="absolute top-4 left-[calc(16.666%-8px)] right-[calc(16.666%-8px)] h-0.5 bg-emerald-400"></div>
                  <div className="absolute top-4 left-[calc(16.666%-8px)] w-0.5 h-4 bg-emerald-400"></div>
                  <div className="absolute top-4 left-1/2 w-0.5 h-4 bg-emerald-400 -ml-[1px]"></div>
                  <div className="absolute top-4 right-[calc(16.666%-8px)] w-0.5 h-4 bg-emerald-400"></div>
                </div>

                {/* ── ИМЯ / ГЛАГОЛ / ЧАСТИЦА ── */}
                <div className="grid grid-cols-3 gap-6 w-full z-10">
                  <div className="w-full bg-blue-50 border-t-2 border-blue-500 rounded-lg p-3 shadow-sm h-full flex flex-col">
                    <div className="text-center mb-2">
                      <Ar className="text-2xl text-blue-800 font-bold block">الِاسْمُ</Ar>
                      <span className="text-[10px] font-bold text-gray-500 uppercase">Имя</span>
                    </div>
                    <div className="text-[11px] text-gray-700 bg-white p-2 rounded border border-blue-100 leading-tight flex-1">
                      Имеет <strong>самостоятельный смысл</strong>, <strong>не связан</strong> со временем.
                    </div>
                  </div>
                  <div className="w-full bg-amber-50 border-t-2 border-amber-500 rounded-lg p-3 shadow-sm h-full flex flex-col">
                    <div className="text-center mb-2">
                      <Ar className="text-2xl text-amber-800 font-bold block">الْفِعْلُ</Ar>
                      <span className="text-[10px] font-bold text-gray-500 uppercase">Глагол</span>
                    </div>
                    <div className="text-[11px] text-gray-700 bg-white p-2 rounded border border-amber-100 leading-tight flex-1">
                      Имеет <strong>самостоятельный смысл</strong>, <strong>обязательно связан</strong> со временем.
                    </div>
                  </div>
                  <div className="w-full bg-slate-50 border-t-2 border-slate-500 rounded-lg p-3 shadow-sm h-full flex flex-col">
                    <div className="text-center mb-2">
                      <Ar className="text-2xl text-slate-800 font-bold block">الْحَرْفُ</Ar>
                      <span className="text-[10px] font-bold text-gray-500 uppercase">Частица</span>
                    </div>
                    <div className="text-[11px] text-gray-700 bg-white p-2 rounded border border-slate-200 leading-tight flex-1">
                      <strong>Не имеет полного смысла</strong>; появляется только в связке с <Ar>الاسم</Ar> или <Ar>الفعل</Ar>.
                    </div>
                  </div>
                </div>

                {/* Слияние 3 веток → центр */}
                <div className="relative w-full h-8 z-0">
                  <div className="absolute top-0 left-[calc(16.666%-8px)] w-0.5 h-4 bg-emerald-400"></div>
                  <div className="absolute top-0 left-1/2 w-0.5 h-4 bg-emerald-400 -ml-[1px]"></div>
                  <div className="absolute top-0 right-[calc(16.666%-8px)] w-0.5 h-4 bg-emerald-400"></div>
                  <div className="absolute top-4 left-[calc(16.666%-8px)] right-[calc(16.666%-8px)] h-0.5 bg-emerald-400"></div>
                  <div className="absolute top-4 left-1/2 w-0.5 h-4 bg-emerald-400 -ml-[1px]"></div>
                </div>

                <ChainLink />

                {/* ══════ БЛОК 1: И'РАБ И МАБНИ ══════ */}
                <div className="inline-block bg-emerald-100/50 px-6 py-2 rounded-xl border border-emerald-200 shadow-sm z-10 text-center">
                  <h2 className="text-2xl font-bold font-serif text-emerald-800">
                    <Ar>الْإِعْرَابُ وَالْبِنَاءُ</Ar>
                  </h2>
                  <p className="text-[10px] font-normal uppercase text-emerald-600 tracking-widest">(СОСТОЯНИЕ СЛОВА)</p>
                </div>

                {/* Разветвление на 2 ветки */}
                <div className="relative w-full h-8 z-0">
                  <div className="absolute top-0 left-1/2 w-0.5 h-4 bg-emerald-400 -ml-[1px]"></div>
                  <div className="absolute top-4 left-[calc(25%-6px)] right-[calc(25%-6px)] h-0.5 bg-emerald-400"></div>
                  <div className="absolute top-4 left-[calc(25%-6px)] w-0.5 h-4 bg-emerald-400"></div>
                  <div className="absolute top-4 right-[calc(25%-6px)] w-0.5 h-4 bg-emerald-400"></div>
                </div>

                <div className="grid grid-cols-2 gap-6 w-full z-10 items-stretch">
                  <div className="bg-green-50 p-4 rounded-xl border border-green-300 flex flex-col shadow-sm h-full">
                    <h3 className="text-xl font-bold text-green-900 font-serif mb-1">
                      <Ar>الْمُعْرَبُ</Ar> <span className="text-xs font-sans text-green-700">(Изменяемое)</span>
                    </h3>
                    <p className="text-xs text-green-800 mb-3">Окончание слова меняется под воздействием факторов (падежей).</p>
                    <div className="space-y-1.5 mt-auto">
                      <div className="bg-white p-2 rounded text-xs flex justify-between items-center border border-green-100">
                        <span className="text-gray-500"><Ar>الرَّفْعُ</Ar> (Им.п.)</span>

                {/* ══════ БЛОК 7: ГЛАГОЛЫ (ТАБЛИЦА) ══════ */}
                <div className="inline-block bg-orange-50 px-6 py-2 rounded-xl border border-orange-200 shadow-sm z-10 text-center relative">
                  <h2 className="text-2xl font-bold font-serif text-orange-800">
                    <Ar>الْأَفْعَالُ</Ar>
                  </h2>
                  <p className="text-[10px] font-normal uppercase text-orange-600 tracking-widest">(СПРЯЖЕНИЕ ГЛАГОЛОВ)</p>
                </div>

                <div className="w-0.5 h-8 bg-emerald-400 relative z-0"></div>

                <div className="overflow-hidden rounded-xl border-2 border-emerald-400 shadow-md relative z-20 w-full">
                  <table className="w-full text-center text-sm" role="table">
                    <caption className="sr-only">Спряжение глагола ذَهَبَ (идти) по лицам и временам</caption>
                    <thead className="bg-orange-100 text-orange-900 font-bold text-xs uppercase">
                      <tr>
                        <th scope="col" className="p-3 border-b-2 border-r border-orange-200">Лицо / Местоимение</th>
                        <th scope="col" className="p-3 border-b-2 border-r border-orange-200"><Ar>الْمَاضِي</Ar> (Прошедшее)</th>
                        <th scope="col" className="p-3 border-b-2 border-r border-orange-200"><Ar>الْمُضَارِعُ</Ar> (Наст./Буд.)</th>
                        <th scope="col" className="p-3 border-b-2 border-orange-200"><Ar>الْأَمْرُ</Ar> (Приказ)</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white">
                      {VERBS.map((v, i) => (
                        <tr key={i} className="border-b border-orange-50 hover:bg-orange-50/50 transition-colors">
                          <td className="p-2.5 border-r border-orange-100 text-xs font-bold text-gray-600">{v.face}</td>
                          <td className="p-2.5 border-r border-orange-100 font-bold text-orange-800"><Ar className="text-lg">{v.madi}</Ar></td>
                          <td className="p-2.5 border-r border-orange-100 font-bold text-blue-800"><Ar className="text-lg">{v.mudari}</Ar></td>
                          <td className="p-2.5 font-bold text-red-800"><Ar className="text-lg">{v.amr}</Ar></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

              </div>
            </ScaleWrapper>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ArabicGrammarApp />);
  </script>
</body>
</html>
